    content: >-
      **eLife Assessment**  
        
      This fundamental work substantially advances our understanding of a major research question: whether collagen can
      be directly imaged with MRI. The evidence supporting the conclusion is compelling, with methods, data, and
      analyses that are more rigorous than those currently considered state-of-the-art. The work will be of high
      interest to MR physicists and clinicians, as collagen is the most abundant protein in the human body and plays an
      essential role in health.
