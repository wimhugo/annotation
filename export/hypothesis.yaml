      Zylberberg et al. reanalyze eye-tracking and behavioral data (mostly from Krajbich et al., 2010) to test two
      predictions of the attentional Drift Diffusion Model, finding that these predictions are not met. Similarly,
      predictions of normative models (inspired by rational inattention) are not in line with the data, and the authors
      propose a post-choice model of attention. This model better accounts for the two effects but also does not account
      for all patterns, so the authors conclude that eye movements most likely reflect both pre- and post-decisional
      processes.  
        
      Strengths:  
        
      A clear strength is the systematic falsification-based approach of the paper, establishing (partially) new
      predictions and testing to what extent these are met by extant models and by a newly developed theory. The authors
      do a good job in providing intuitions behind the effects and the reasons why models such as the aDDM predict them.
      The paper is of substantial relevance for the field, as it shows that effects pertaining to the last fixation(s)
      should be interpreted with caution. Another strength is the paper's transparency as the authors clearly
      acknowledge that their new model does not do a perfect job either.  
        
      Weaknesses:  
        
      The paper focuses on analyzing the Krajbich 2010 data, but shows that the second effect replicates in many other
      datasets. A more principled approach, in which both effects are analyzed and presented for all datasets, would be
      more convincing. The results should then be shown together for clarity/readability.  
        
      Similarly, it would be nice to show to what extent the models' predictions depend (not depend) on using the
      best-fitting parameter values (are there any parameter settings under which the two effects are not predicted?)
