  annotation_56:
    id: CfZuWj72EfGrVt-8OsS1nA
    content: >-
      **Reviewer #2 (Public review):**  
        
      Summary:  
        
      This paper asks an important question that has not been discussed much in the extensive literature on the High
      Frequency Oscillations (HFOs) that have been extensively studied in patients with epilepsy and experimental models
      of epilepsy. The question is whether the Fast Ripples (FRs), the HFOs in the 250-500 Hz frequency band, represent
      a pathological phenomenon or represent a physiological phenomenon that occurs in the healthy brain but happens to
      be more frequent in epileptic tissue. It is an important question that has not been systematically addressed until
      now. The authors conclude, from very extensive simulations, from extensive experimental animal studies (the
      systemic kianate model of epilepsy in rats), and from a modest amount of human data, that FRs occur in healthy
      brains as a result of the chance occurrence of bursts of action potentials, and that in epileptic tissue, their
      frequency of occurrence is approximately 30% higher than what is expected by chance. They conclude that FRs are
      not a separate phenomenon of epileptic tissue. This finding is reinforced by the recent findings of FRs in
      experimental models of Alzheimer's disease.  
        
      Strengths:  
        
      This is a valuable study because it asks an important and original question and because it evaluates it from
      several angles (simulation, tissue culture, experimental animals, and human patients). The simulations and the
      analyses of real data are performed very carefully and with original and solidly documented approaches, using
      extensive simulations and extensive data sets in the cultured cell data and in the in vivo experiments. The paper
      is clearly written and well-illustrated.  
        
      Weaknesses:  
        
      I found only one serious weakness in this study, but it is one that is of importance. Although the original work
      on FRs was done in an experimental model of epilepsy, the field really became prominent when ripples and fast
      ripples were found first in microelectrode recordings of epileptic patients and then in the intracerebral EEG of
      such patients. Numerous studies have been performed since then, with a valuable meta-analysis including 700
      patients (Wang Z, Guo J, van 't Klooster M, Hoogteijling S, Jacobs J, Zijlmans M. Prognostic Value of Complete
      Resection of the High-Frequency Oscillation Area in Intracranial EEG: A Systematic Review and Meta-Analysis.
      Neurology. 2024 May 14;102(9). Although the consensus at this point is that FRs are not the ideal and totally
      specific marker of epileptic tissue that many thought it could be, FRs are nevertheless much more frequent in
      epileptic tissue than in non-epileptic tissue and are a solid biomarker. It is also well established that they are
      much more frequent in NREM sleep than in wakefulness, as reported in the original paper of Staba et al (Staba RJ,
      Wilson CL, Bragin A, Jhung D, Fried I, Engel J Jr. High-frequency oscillations recorded in human medial temporal
      lobe during sleep. Ann Neurol. 2004 Jul;56(1):108-15., not mentioned in this paper) and in the study of Bagshaw et
      al (2009). In this last paper, using SEEG in various brain regions, the average rate of FRs in NREM sleep is about
      6 times that in wakefulness. In the paper by Staba, with microelectrodes in mesial temporal structures, it is
      about twice. As a separate issue, the paper of Fraucher et al (Frauscher B, von Ellenrieder N, Zelmann R, Rogers
      C, Nguyen DK, Kahane P, Dubeau F, Gotman J. High-Frequency Oscillations in the Normal Human Brain. Ann Neurol.
      2018 Sep;84(3):374-385), which is not quoted, found that, in an extensive sample, non-epileptic human tissue
      sampled with SEEG generated extremely rare FRs (an average rate of 0.04/min/channel, i.e. 1 every 25 min).  
        
      The results above are mentioned because they do not fit with the data provided in the present study: FRs are much
      more frequent in NREM sleep than in wakefulness in human epileptic patients, and they are much more frequent (not
      30% more, but many hundreds of percent more) in epileptic tissue than in non-epileptic human tissue. The
      fundamental phenomenon of interest is, I believe, the FRs in epileptic patients. The animal experiments, tissue
      studies, and simulations are models to study the human phenomenon. With respect to the modulation by sleep and the
      differentiation between epileptic and non-epileptic tissue, it seems that the systems studied in this paper are
      not good models of the human condition. The human results presented in the study only reflect wakefulness
      recordings, which is not the condition in which most HFO studies have been done and in which most HFOs occur. The
      authors refer to the study of long-term fluctuations in HFO rates by Gliske et al. (2018) to say that one has to
      be careful with the results regarding sleep, for example, Bagshaw et al (2009), but the clear predominance in of
      HFOs in NREM sleep has been observed by many studies. The cautions regarding fluctuations over extended periods
      also apply to the awake human data analyzed in this study.  
        
      The study's conclusions regarding the generation of FRs are therefore questionably applicable to the human
      condition. I do not dispute their validity for the models and situations in which they were studied.
