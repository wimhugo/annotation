is not confined to the liver, as they were also found within the CAM. These cells likely represent a ubiquitously distributed cell population present in both healthy and xenografted chicken embryos,\" and \"...since EdU-cyto+ cells are consistently present in non-grafted embryos as well, the phenomenon is not triggered by xenografting or the presence of PDAC cells.\" However, since the authors do not present any absolute markers proving that EdU-cyto+ cells are EdU+ chicken granulocytes, the authors' statement that \"Given the high number of EdU+ granulocytes observed, it is more likely that these are neutrophils rather than eosinophils\" appears highly speculative.\r\n\r\nFourth, regarding Ki67 staining: Careful consideration and robust validation are essential when drawing conclusions and interpretations about Ki67's role in cell proliferation and the cell cycle.\r\nResearch shows that Ki-67, an important cell cycle marker, has two main splice variants, &#x03B1; and &#x03B2;, which are regulated differently in normal and cancer cells at mRNA and protein levels.  Moreover, Ki-67 undergoes constant regulation and degradation through the proteasome system in both cell types, indicating a dynamic control mechanism for this protein. It was also observed a putative extranuclear elimination pathway of Ki-67, where it is transported to the Golgi apparatus. Furthermore, the unforeseen extranuclear removal of Ki-67 strongly indicates the necessity to examine this protein beyond the confines of the \"nuclear box,\" a perspective that has been overlooked until now [see e.g., Chierico L, Rizzello L, Guan L, Joseph AS, Lewis A, Battaglia G (2017) The role of the two splice variants and extranuclear pathway on Ki-67 regulation in non-cancer and cancer cells. PLoS ONE 12(2): e0171815. https://doi.org/10.1371/journal.pone.0171815].\r\n\r\nLast but not least, regarding the authors' conclusion: \"We report a novel phenomenon: the apparent cytoplasmic accumulation of EdU in nondividing chicken granulocytes.\" The phenomenon of DNA replication taking place in the cytoplasm is not a novel observation. In instances like replication stress, the cytosol can initiate a response pathway that encompasses the detection of cytosolic DNA and subsequent signaling processes focused on genome protection. Cytosolic DNA generated after replication stress activates a Ca2+-dependent pathway to protect stalled replication forks [Li, S., Lu, H. T., & You, Z. (2025). Cytosolic DNA and intracellular Ca2+: Maintaining genome stability during replication stress. DNA repair, 152, 103877. https://doi.org/10.1016/j.dnarep.2025.103877].\r\n Damage to the DNA template caused by environmental pollutants, like radiation and genotoxic chemicals, can impede the replication process.Physiological stressors also affect fork dynamics, including metabolic byproducts like reactive oxygen species, conflicts in replication and transcription, repetitive DNA elements such as telomeres, sequences that form secondary structures, DNA-RNA hybrids, misincorporated ribonucleotides, and low availability of DNA precursors. In response to these challenges, cells have developed an intricate network of surveillance and repair mechanisms. They identify replication stress, support stalled forks, fix problems, and allow replication to proceed. These pathways are crucial for maintaining genome stability and ensuring proper cellular function. Several excellent reviews on the topic included [M.R. Higgs\r\nBOD1L is required to suppress deleterious resection of stressed replication forks\r\nMol. Cell (2015)\r\nR. Kumar et al.\r\nRIF1: a novel regulatory factor for DNA replication and DNA damage response signaling\r\nDNA Repair(2014)\r\nW. Leung\r\nATR protects ongoing and newly assembled DNA replication forks through distinct mechanisms\r\nCell Rep.(2023)\r\nM.B. Adolph et al.\r\nMechanisms and regulation of replication fork reversal\r\nDNA Repair (Amst. )(2024)\r\nZ. You et al.\r\nThe role of single-stranded DNA and polymerase alpha in establishing the ATR, Hus1 DNA replication checkpoint\r\nJ. Biol. Chem.(2002)\r\nA. Kumagai\r\nTopBP1 activates the ATR-ATRIP complex\r\nCell(2006)\r\nJ. Lee et al.\r\nThe Rad9-Hus1-Rad1 checkpoint clamp regulates interaction of TopBP1 with ATR\r\nJ. Biol. Chem.(2007)].\r\nTo validate the authors' conclusions regarding the presence or absence of the declared phenomenon, I would recommend modulating TREX1 expression. Overexpression of TREX1, a nuclease that degrades cytosolic DNA, suppresses TRPV2-mediated Ca2+ release under replication stress. TREX1 depletion, however, leads to cytosolic DNA accumulation.\r\n\r\nMethodological ambiguities:\r\nIn the section \"Nucleoside labeling of dividing cells in the CAM model\":\r\nIt is not clear when BrdU and EdU were given after tumor cell implantation, or how to standardize the distance from the tumor as suggested by \"...as far away from the visible tumor as possible...\". I question whether such a \"precise\" description of the application site would contribute \"...to ensure low variability in labeling duration...\", especially when it was performed by two independent researchers \"...in tandem, ensuring that an experimental group of 16 embryos could be labeled in less than five minutes.\"\r\n\r\nIn the section \"Immunofluorescence labeling of cryosections\":\r\n\"...a blocking and permeabilizing solution in a humidified atmosphere.\" This solution is comprised of final concentrations of 0.1% Triton-X-100, 0.02% sodium azide, 5% horse serum (Sigma-Aldrich, Cat#H1270), 0.01% thimerosal, and 0.3% bovine serum albumin (Sigma-Aldrich, Cat#A7284) in PBS at pH 7.4.\"\r\nAbsence of detergent is used during incubation with primary and secondary antibodies (even the widely recommended Tween20!). I wonder whether it might be the source of non-specific tissue labelling by donkey anti-chicken IgY that was considered as an evidence of chicken origin.\r\n\n\n#### Significance\n\n *General asssesment:*\r\n\r\nThe research has technical significance, and encourages greater use of this alternative animal model in cancer studies to help us understand the regulation of the cancer cell cycle. This, in turn, may improve the implementation of existing treatment methods or uncover potential vulnerabilities in the cancer cell cycle. No clinical significance so far. Certan groups conducting cancer biology studies and modelling might be interested in implementation of the described method, although it will be challenging without macroscopic evidence of the expected tumor nodules.The data and the methods presented in such a way that reproducing them might be challenging.The experiments are not adequately replicated and statistical analysis inadequate.\n\n"
