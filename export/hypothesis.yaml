  annotation_63:
    id: 2TnUFD71EfG-Fk_vPonr0g
    content: >-
      **Reviewer #3 (Public review):**  
        
      Summary:  
        
      In this study, the authors reanalyzed choice, RT and gaze datasets collected from human subjects performing a
      food-choice task. They show that models that posit a causal role for attention in shaping the decision-making
      process fail to account for empirical observations in the data. These include the attentional drift diffusion
      model (aDDM) and models that derive attention-choice associations from an optimal policy. The authors show that a
      model that assumes that gazes are directed towards the chosen option after decision commitment captures more (but
      not all) empirical findings, suggesting that attention may reflect decisions once they are made instead of
      contributing to their formation. However, this post-decision-gaze (PDG) model failed to capture all aspects of the
      data, suggesting that gaze may reflect both decisional and post-decisional operations, and existing models are
      still missing some features of the gaze-directing process. The authors provide convincing evidence that
      post-decision gaze explains a number of empirical findings in this task.  
        
      Strengths:  
        
      (1) The analyses are generally appropriate, and the conclusions are supported by the data.  
        
      (2) The study was rigorous, as the authors considered a number of alternative possible models for behavior, and
      evaluated their performance based on a wide range of qualitative predictions (as opposed to exclusively relying on
      model comparison).  
        
      (3) The proposal that gaze may largely reflect post-decisional processes is interesting, and as far as I am aware,
      novel.  
        
      Weaknesses:  
        
      There was limited discussion about why one might allocate attention post-decision. I would have appreciated more
      discussion on the potential functional consequences or implications of post-decision gaze.
