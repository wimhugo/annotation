  annotation_87:
    id: Sbo0hD7zEfGpBZPgUMgN4g
    content: >-
      **Reviewer #1 (Public review):**  
        
      Summary:  
        
      The authors have used a macaque (two animals only) to follow the migration of 'seeded' TDP43 protein in neuronal
      pathways - thus mimicking the spread of ALS in the human CNS. Previous experiments in rodents failed to
      demonstrate this, posing interesting and important biological differences, possibly related to the UMN-LMN system
      in higher order apes and humans.  
        
      Strengths:  
        
      An important step forward.  
        
      Weaknesses:  
        
      No weaknesses were identified by this reviewer. Only 2 animals were used, but that is appropriate given the
      sensate status of the macaque. In the opinion of this reviewer, the results are entirely convincing.
