  annotation_76:
    id: tU5YyD70EfG9MC8iKohg8A
    content: >-
      **eLife Assessment**  
        
      This study presents a useful array of analyses of the effects of training and/or instruction to use the method of
      loci during episodic encoding and retrieval. A major strength of the experiment is the impressive recruitment of
      memory athletes and the training of novice athletes to use the method of loci, long known to improve the precision
      of memory recall. That said, the sheer number of results and their organization should be addressed; streamlining
      the results and placing them, whenever possible, in a theoretical framework will be tremendously useful to
      readers. As it stands, the presented work is incomplete with respect to the major conclusions that training itself
      leads to neural differentiation of prefrontal cortical neural patterns, and the authors need to temper these
      claims.
