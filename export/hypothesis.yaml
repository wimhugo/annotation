  annotation_55:
    id: CiRmoj72EfGTkm_fFGi0iQ
    content: >-
      **Reviewer #1 (Public review):**  
        
      Summary:  
        
      This is a study utilizing several types of analyses (computational modeling, neuronal cultures, rodent epilepsy
      model, and human intracranial multi-scale recordings) to address a highly relevant conceptual question: Are fast
      ripples (FRs) distinct pathological entities or largely emergent products of stochastic spike clustering? The
      results can potentially reshape current approaches to incorporating fast ripples into the epilepsy surgery
      evaluation.  
        
      Strengths:  
        
      The conceptualization of fast ripples as potentially arising by chance is highly novel and builds effectively on
      questions raised in prior studies that have never been satisfactorily resolved.  
        
      The integration across biological scales and models is a major strength. The state dependency analysis provides
      additional, strong support. The methodology and statistical approaches used are thoughtfully presented and
      rigorously applied.  
        
      In particular, this paper provides a strong response to the findings from Gliske et al, Nat Commun 2018. This
      study utilized long-term data analysis to uncover low rates of FRs detected from most recording sites, suggesting
      spurious detections, although FRs were concentrated within seizure onset areas.  
        
      Weaknesses:  
        
      The authors clearly aimed to use a statistical rather than a mechanism-based approach in this work. However, the
      paper's framing of true fast ripples as oscillatory events with stochastic fast ripples considered as confounders
      does not take prior investigations into biological mechanisms, particularly prior studies that point to an
      important role for stochastic fast ripples in some contexts. Incorporating recognition of these mechanisms would
      strengthen the manuscript and provide a more complete and nuanced characterization.  
        
      Some examples from the literature:  
        
      Eissa et al, eNeuro 2016, a paper that closely parallels this manuscript but took a mechanistic rather than
      statistical approach, showed that fast ripples can arise from population paroxysmal depolarizations - a key
      feature of epileptiform discharges - as temporally clustered, jittered population firing, with FRs appearing in
      LFP or EEG due to summated postsynaptic potentials (which are slower than action potentials and can generate
      signals in the high gamma range).  
        
      Foffani et al., 2007, Neuron, and Ibarz et al., 2010, J Neurosci, argue that FRs are pseudo-oscillations created
      by jittered neuronal populations in the setting of altered spike timing.  
        
      Smith et al., 2020, Sci Rep, contrasts FR characteristics in different regimes, i.e., intact inhibition early in a
      seizure vs. implied collapse of inhibition after recruitment. Schlingloff et al., 2025, J Neurosci, reported
      analogous findings in an animal model.  
        
      The computational model and subtraction approach provide a strong case for the random emergence of clustered
      activity in the high gamma band, given its assumptions. However, any such modeling effort needs to account for
      inhibitory activity, including impaired inhibitory function that is expected in epileptic brain regions, which has
      a strong modulating effect on excitatory firing and is thought to play a significant role in FR generation.  
        
      The shuffling procedure aims to preserve the power spectrum but randomizes high frequency phase (>200 Hz).
      However, this procedure removes biologically meaningful spike timing correlations, as well as structured
      cross-frequency coupling. The subtraction method thus likely underestimates the incidence of structured "distinct"
      FRs, while perhaps overestimating "chance" FRs due to biologically infeasible activity, making the statement that
      most FRs are due to chance correlation too strong.  
        
      The kainate findings underscore this point: the increase in the number of FR detections could be, as the authors
      state, an increase in chance clustering due to increased network excitability generally. However, the likelihood
      of a parallel increase in pathological FRs cannot be ruled out, given likely pro-epileptic alterations in spike
      timing and circuit function.
