  annotation_90:
    id: STR0hD7zEfGSpzuXURiXKw
    content: >-
      **Reviewer #4 (Public review):**  
        
      Summary:  
        
      In this manuscript, the authors present data describing the development of a model of ALS in rhesus macaques. They
      use a viral intersectional model to overexpress TDP-43 in a population of motor neurons and then study the spread
      of the pathology about 7 months later. They demonstrate that both the cervical spinal cord and motor cortex (new
      and old M1) are full of TDP-43, suggesting that the pathology spreads from the single motor pool to presumably
      related neurons.  
        
      Strengths:  
        
      This is a super-important study in two main ways:  
        
      (1) This could be the birth of a really important model, one that is really needed for making progress in
      understanding ALS and the development of therapeutics. There are shortfalls with all the rodent models. Models
      dependent on cell cultures are superb for understanding cell-autonomous processes, but miss out on connectivity,
      particularly the long-range connectivity. Organoids may ultimately prove to be beneficial, but they would need
      cortex, spinal cord, and muscle, and translatability from them is not assured. So a NHP model is needed, and this
      may be it. Furthermore, the Methods are meticulously described and will undoubtedly facilitate reproducibility.  
        
      (2) The concept of the spread of pathology has been proposed for some time, I think, based initially on the
      detailed clinical observations of Ravits and colleagues. The authors have looked at this directly and provide
      supporting evidence for this interesting hypothesis. They show spread locally and contralaterally in the spinal
      cord (although a figure would be nice) and to the motor cortex.  
        
      Taking only these 2 points into account is more than sufficient for me to be enthusiastic about this work.  
        
      Weaknesses:  
        
      I'd like to make a couple of points that if addressed, could, in my view, help the authors strengthen this work.  
        
      (1) We don't know how many MNs were transduced by the rAAV. There was no tdTom expression, for whatever reason.
      The authors show an image of a control experiment with a single MN transduced, but there should be a red motor
      pool, at least in the control experiments. The impression that I get is that very few were transduced, and, in my
      mind, this makes the findings even more interesting - maybe you don't need many "starter" MNs.  
        
      (2) Continuing on this point, this leads the authors to conclude that all BR MNs have died. They support this by
      the reduced MN count (see point 3). Firstly, do we know how many BR MNs there are in the rhesus macaque, and does
      the reduction seen correspond to this number? Secondly, and more importantly, the muscle looks normal on MRI at 28
      weeks - it does not look like a denervated muscle. The authors state that it has maybe been reinnervated, but by
      what, if all the BR MNs are dead? This does not seem like a plausible explanation to me. Muscle histology, NMJs,
      and fibre typing would have been useful to understand what's going on with the MNs. (And electrophysiology would
      have been wonderful, but beyond the scope of this study.)  
        
      (3) Some MN biologists, like me, fuss a lot about how to count MNs, which is almost as difficult as counting the
      number of angels on the head of a pin. Every method has its problems. Focusing on the two methods here: (a) ChAT
      immunohistochemistry is pretty good in healthy states, but we don't know what happens to ChAT expression in
      different diseases, particularly when you have a new model. If its expression is decreased, then it is not a good
      marker for MNs; (b) Identifying MNs based on the size and morphology of neurons in the ventral horn is also
      insufficient. For example, ~30% of neurons in a typical pool are small gamma MNs, and a significant proportion
      (depending on the muscle) of the remainder will be small alpha MNs. So what one is counting is, at best, the large
      alpha MNs, not all the MNs in a pool. And in ALS, it's these largest MNs that are affected at the earliest stages.
      The small ones might be fine. So results will be skewed. (Hence, it would be interesting to see if the muscle had
      a higher proportion of Type I fibres after being reinnervated by S-type MNs.)  
        
      (4) Statistics. These are complex experiments looking at the spread of a disease. The experimental unit is
      therefore the monkey, n=2. In each monkey, multiple sections are analysed, which are key technical replicates and
      often summative. For example, do we care about the average cell number in Figures 4D, E, 5 I, J or 6G, H, or
      rather the total cell number? Do the error bars mean anything? To be clear, I am by no means minimising the
      importance of the overall convincing findings. But I do not think this statistical analysis is particularly
      meaningful.
