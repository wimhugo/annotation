  annotation_57:
    id: CcXU6D72EfGZfyPEX935tg
    content: >-
      **Reviewer #3 (Public review):**  
        
      Summary:  
        
      An outstanding question in the field of high-frequency oscillations (HFOs) in the context of epilepsy is how these
      oscillations emerge, considering that they occur at such high frequencies, i.e., 250Hz, well above the firing
      ability of single neurons. One hypothesis that has been suggested in the past is that neurons that fire in an
      out-of-phase fashion, or rather at random intervals,s may contribute to a spectrum of HFOs ranging from 250-500Hz
      that are observed in epilepsy. However, how possible it is that random action potentials could aggregate to the
      extent that they could give rise to HFOs in the so-called fast ripple (FRs) frequency range (>200 according to the
      authors) remains unclear. To test this hypothesis, they used computational modeling to randomly insert action
      potentials in a signal, and they found that this approach is sufficient to generate FRs. Some of the predictors of
      whether FRs could occur were neuronal count, firing rate, and synchronization. Besides computational modeling,
      they used different model systems to test whether that would be possible to be observed in neuronal cultures, in
      epileptic rats (intrahippocampal kainic acid model), and human data. Neuronal cultures treated with picrotoxin did
      not show evidence that FRs could be generated beyond chance aggregation of action potentials. They then asked
      whether synchronization and firing rate could play a role in the emergence of FRs. They found that changes in
      neural firing and synchronization, such as those occurring during differences phase of the sleep-wake cycle, could
      affect the number of FRs occurring by chance aggregation, with more FRs seen during periods of wakefulness, a
      result that they replicated in human data.  
        
      The authors largely achieve their proposed aims of demonstrating that random neuronal firing can, in principle,
      generate FRs. Results from this study could influence current thinking around mechanisms generating FRs in
      epilepsy. The use of different computational approaches and model systems could offer new analytical methodologies
      for the study of FRs in the context of brain disease.  
        
      Strengths:  
        
      (1) The authors used a multi-level approach combining computational modeling with experimental datasets, including
      neuronal cultures, a rat model of temporal lobe epilepsy, and human data.  
        
      (2) Identification of key parameters such as neuronal count, firing rate, synchronization, and brain state in
      observed incidence of FRs generated through random aggregation of neural firing.  
        
      (3) Cross-species validation increases the likelihood of generalizability of the findings.  
        
      Weaknesses:  
        
      (1) Some of the simulated FRs appear short in duration and may not meet standard detection and definition
      criteria, potentially influencing validity.  
        
      (2) The neuronal culture approach does not directly test random insertion of action potentials, limiting
      interpretation.  
        
      (3) Sleep is treated as a homogeneous state in the rat dataset, without accounting for stage-specific differences
      in synchronization, which may affect the results and interpretation.  
        
      (4) The analyses conducted in human data lack direct comparison with sleep data.
