  annotation_82:
    id: WzWh_D70EfGx6XsJbvL7nw
    content: >-
      **Reviewer #1 (Public review):**  
        
      This manuscript investigates how chemogenetic depolarization of medial entorhinal cortex layer II stellate cells
      reshapes spatial coding in downstream hippocampal CA1. Building on the authors' prior work (Kanter et al., Neuron
      2017), the study examines changes in grid cell subfield firing rates and CA1 place cell firing patterns after CNO
      administration. A central advance of the present work is the use of the same manipulation on two consecutive days.
      The authors show that the induced grid subfield rate changes are highly similar across days and that CA1 place
      field reorganization is likewise reproducible across days. In addition, they report that CA1 remapping after CNO
      is not arbitrary. The new main place field often emerges at a location that can be anticipated from the baseline
      rate map of the same cell, typically corresponding to a weak secondary peak outside the primary field. Finally,
      the authors demonstrate that these experimental findings can be recapitulated in a feedforward grid to place cell
      model by selectively redistributing grid subfield firing rates, supporting the interpretation that grid subfield
      rate changes are sufficient to drive predictable and reproducible place field reorganization.  
        
      Overall, this study is positioned as a follow-up to the authors' previous report in which the main phenomenon
      (grid subfield rate remapping and accompanying CA1 place cell remapping following chemogenetic depolarization of
      MEC layer II neurons) was already established. While the conceptual novelty is therefore incremental, the present
      manuscript adds important and convincing evidence about two key properties of this phenomenon, including its
      reproducibility across days and the extent to which the direction of place field reorganization is predictable
      from baseline activity. The experimental approach and analyses appear generally appropriate and carefully
      executed, and the inclusion of modeling strengthens the mechanistic interpretation. These results provide useful
      new insight into stable input-output relationships within the entorhinal hippocampal system, and the work will be
      of interest to researchers studying remapping and the grid to place cell transformation.
