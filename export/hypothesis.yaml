  annotation_28:
    id: rfvjED8DEfGnmdvvEaYjvw
    content: >-
      **Reviewer #1 (Public review):**


      This is a very interesting paper. The research question is intriguing, allowing the authors to address commonly
      observed comorbidities between depression and anxiety and their dissociable and opposite relationship to mood
      fluctuations and sensitivity to reward prediction errors. The computational analyses are very in-depth, including
      many state-of-the-art checks and validations. Another strength is the inclusion of several large or very large
      samples, including a patient sample in addition to the general population sample.


      I have the following questions:


      (1) Factor analysis

      I found the hierarchical organization of the factors interesting. While this is a very common procedure in, for
      example, the field of intelligence (producing sub-scores and a general g factor), it is not yet very commonly used
      in the field of computational psychiatry (though it has been validated before for anxiety/depression, so it is
      used here with good reason). I was also impressed by the methodological depth. In particular, it was of note how
      thoroughly done it was (for example, repeating the EFA on the second half of the data set). I have one question
      though: is the sample size too small for the exploratory analyses, given the number of items? Given the stability
      across the half-split, I imagine it is not. Perhaps the authors could spell out how many items, what would be the
      recommended standard for a subject-to-item ratio, and comment on this. A very technical point, the authors should
      specify how they extracted the factor scores from the other data sets (is it using the Thurstone or Bartlett
      method)? From experience (though not doing a hierarchical factor analysis), Bartlett can be somewhat better
      compared to the default (Thurstone) - better as in the resulting factors more closely recapitulating the factor
      correlations in the original sample (and independence of responses of other participants in a sample for computing
      a person's factor score). Could you also comment on similarities or divergences in this hierarchical factor
      analysis approach from another one recently used transdiagnostically in Wise et al. (2026, Translational
      Psychiatry)?


      (2) Linking factors to task parameters

      As I understand it, the authors relate the orthogonalized depression/anxiety to task parameters (sensitivity to
      RPEs on mood and mood variations) using correlations. In order to have a better understanding of how this relates
      to other commonly used approaches, I would pose two questions:


      (i) What are the correlations when the full (non-orthogonalized) factor scores for depression and anxiety are
      used? Are the signs the same?

      (ii) What are the results when, instead of the independent correlations, the authors perform b_RPE ~ anxiety +
      depression (again using the non-orthogonalized factors)?


      I'm assuming all of these analyses should give the same results if the authors' hypothesis of opposing effects of
      anxiety and depression holds true.


      Minor comments:


      (1) The authors should write down when the data were collected for each study. This is because AI capabilities
      have massively increased since ~2020 in quite specific steps (with the public release of new AI models), meaning
      that AI is likely to have been able to do tasks and questionnaires without detection if data were collected
      recently.


      (2) The authors should include a statement in the methods section that checks for AI were done. If none yet, could
      you do any? Recent papers (Westwood, PNAS 2025; van der Stigchel PNAS, 2026) point to the risk since at least the
      release of o4-mini (used in the cited paper to create very human-like behaviour).


      (3) It would have been good to collect questionnaires of other, thought to be unrelated psychiatric traits, like
      compulsivity or schizophrenia symptoms, to check the specificity of the results, also under the assumption that
      higher scores on either of these skewed questionnaires can pick up individual differences in 'bad questionnaire
      completion'. The authors should comment on the absence of other questionnaires in the discussion in the
      limitations section.


      (4) The authors could include a more explicit sentence in the abstract stating that the anxiety result did not
      hold up in the clinical population. 
    description: >-
      **Reviewer #1 (Public review):**


      This is a very interesting paper. The research question is intriguing, allowing the authors to address commonly
      observed comorbidities between depression and anxiety and their dissociable and opposite relationship to mood
      fluctuations and sensitivity to reward prediction errors. The computational analyses are very in-depth, including
      many state-of-the-art checks and validations. Another strength is the inclusion of several large or very large
      samples, including a patient sample in addition to the general population sample.


      I have the following questions:


      (1) Factor analysis

      I found the hierarchical organization of the factors interesting. While this is a very common procedure in, for
      example, the field of intelligence (producing sub-scores and a general g factor), it is not yet very commonly used
      in the field of computational psychiatry (though it has been validated before for anxiety/depression, so it is
      used here with good reason). I was also impressed by the methodological depth. In particular, it was of note how
      thoroughly done it was (for example, repeating the EFA on the second half of the data set). I have one question
      though: is the sample size too small for the exploratory analyses, given the number of items? Given the stability
      across the half-split, I imagine it is not. Perhaps the authors could spell out how many items, what would be the
      recommended standard for a subject-to-item ratio, and comment on this. A very technical point, the authors should
      specify how they extracted the factor scores from the other data sets (is it using the Thurstone or Bartlett
      method)? From experience (though not doing a hierarchical factor analysis), Bartlett can be somewhat better
      compared to the default (Thurstone) - better as in the resulting factors more closely recapitulating the factor
      correlations in the original sample (and independence of responses of other participants in a sample for computing
      a person's factor score). Could you also comment on similarities or divergences in this hierarchical factor
      analysis approach from another one recently used transdiagnostically in Wise et al. (2026, Translational
      Psychiatry)?


