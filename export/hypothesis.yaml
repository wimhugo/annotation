  annotation_61:
    id: 2Zs51D71EfGlwfvbftRp6g
    content: >-
      **Reviewer #1 (Public review):**  
        
      Summary:  
        
      This study examines whether gaze direction actively shapes choice during food preference decisions or whether gaze
      and choice evolve largely independently until the moment of commitment. The established framework in this context,
      the aDDM, assumes that gaze causally biases the accumulation of evidence in favour of the fixated item. The
      authors show convincingly that this model fails to fit key behavioural patterns across several datasets, as do
      other published models that make the same assumption. The authors propose an alternative model (Post-Decision-Gaze
      or PDG) in which gaze and decision formation are decoupled: gaze does not influence the decision process, nor is
      it drawn toward the ultimately chosen item, until after the decision threshold is reached. Only during the motor
      execution period (after commitment) is gaze directed to the chosen option. They demonstrate that this model fits
      several observed patterns better than the aDDM and related variants.  
        
      Strengths:  
        
      The work thoroughly considers multiple models and datasets. It advances an interesting alternative perspective on
      gaze-decision interactions and highlights meaningful shortcomings in existing models. The authors take the time to
      explain how modelling assumptions produce specific patterns in the data, which is certainly insightful to readers
      interested in the modelling of value-based decision making.  
        
      Weaknesses:  
        
      It is unclear to what extent the model's success relies on the way non-decision time is formalised in the model.
      In the proposed PDG model, non-decision time is decomposed into separate visual encoding, saccadic execution, and
      manual execution components. Several values (assumed or recovered) do not match known physiological or behavioural
      ranges. This is a common issue in the literature, and the authors may want to address it in light of broader work
      discussing what non-decision time consists of in both manual and saccadic actions (e.g., Bompas et al., 2024, Non
      decision time: the Higgs boson of decision, Psychological Review).  
        
      In particular, the "saccadic execution" parameter appears far too long and too variable to reflect merely
      execution; instead, it likely includes decisional components. This would make more sense since manual and saccadic
      planning essentially rely on distinct brain areas, hence it seems unrealistic that crossing a single threshold
      would trigger both manual and saccadic execution. Similarly, recovered manual non-decision times are substantially
      longer (though not more variable) than expected motor execution durations for button presses. These patterns
      suggest that parts of what the model treats as non-decision time are likely decisional in nature, although perhaps
      related to "action decision" rather than the "value-based decision" of interest to the authors. To what extent
      these two processes neatly follow each other or overlap could be usefully considered.
