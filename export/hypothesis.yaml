  annotation_27:
    id: tNb5pD8DEfGn86vm_oprGg
    content: >-
      **eLife Assessment**


      This important study uses a tripartite transdiagnostic computational framework to distinguish depression-specific,
      anxiety-specific, and shared psychopathology dimensions, in their relationships to mood variability and mood
      reactivity to reward prediction errors across multiple large non-clinical cohorts and a clinical sample. The
      evidence is convincing overall because the study combines large samples, a well-characterized gambling task and
      in-depth computational and psychometric analyses, and it replicates the depression-specific association with
      blunted reward prediction error-sensitivity in a clinical sample. However, the anxiety-specific effects are less
      consistently supported across individual datasets, may be underpowered in the clinical cohort because of
      comorbidity, and some aspects of the factor-analytic, risk-attitude, and mediation analyses would benefit from
      clearer explanation. These findings advance a mechanistic account of how distinct symptom dimensions
      differentially shape reward-based mood updating and variability, providing a principled framework for future
      transdiagnostic modeling. 
