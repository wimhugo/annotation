    content: >-
      On 22 May 1971, forty-seven members of theIWLM boarded the 8 a.m. train from Dublin to Belfast with the aim
      ofpurchasing contraceptives in the north and travelling back with them.According to Mary Kenny, reflecting on what
      became known as the‘Contraceptive Train’:A stunt is often a good way to move political ideas forward: the
      Suffragettes haddone it with their demonstrations – some of which were hair-raisingly violent, andenvironmental
      organisations like Friends of the Earth and Greenpeace have beenimaginative in their various forms of direct
      action.
    description: >-
