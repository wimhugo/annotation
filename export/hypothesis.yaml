      viewed as more tentative.
    description: >-
      **Reviewer #2 (Public review):**  
        
      The authors aim to understand how intensive training with the method of loci changes the brain systems that
      support memory in both elite "memory athletes" and previously untrained adults. They combine a cross-sectional
      comparison of athletes and matched controls with a longitudinal training study including mnemonic training, active
      working-memory training, and passive control groups, and use fMRI pattern-similarity analyses to characterise how
      brain activity patterns during learning and temporal-order judgments become more distinct or more shared within
      and across individuals.  
        
      The dual design is a major strength. It combines findings from both real-world expertise and experimentally
      induced training and adds well-matched control groups. The representational similarity analyses are appropriate
      and reveal a clear, internally consistent picture in which learning with the method of loci leads to more
      idiosyncratic prefrontal and posterior cortical patterns during encoding, and more shared hippocampal-precuneus
      patterns during temporal-order retrieval, observed in both athletes and trained novices.  
        
      However, the study is complex and the manuscript dense, and some secondary analyses feel less central or are
      difficult to interpret. More importantly, while the neural evidence for training-related changes in
      representational format is compelling, the behavioural relevance of these changes is less clearly supported. The
      key per-group brain-behaviour correlations are weak and inconsistent, and the direct association between neural
      and behavioural change across all subjects is not clearly presented.  
        
      Overall, the work convincingly shows that extensive mnemonic practice reorganises neural representations in
      specific networks, but the strength and specificity of the claimed link to long-term memory improvements should be
      viewed as more tentative.
