  annotation_20:
    id: U2tTNj8NEfG5e_fxvHoBsQ
    content: >-
      **Reviewer #3 (Public review):**  
        
      The paper is well written and well presented. The topic is important, and its significance is explained succinctly
      and accurately. I am only capable of reviewing the clinical aspects of this work which is very largely technical
      in nature. Several clinical points are worth considering:  
        
      (1) Tendons typically display large magic angle effects as a result of their highly ordered collagen structure
      (cortical bone much less so) and so it would have been of interest to know what orientation the tendons had to B 0
      (in vitro and in vivo). This could affect the signal level at the longer echo time and thus the signal on the
      subtracted images.  
        
      (2) The in vivo transverse image looks about mid-forearm where tendons are not prominent. A transverse image of
      the lower forearm where there is an abundance of tendons might have been preferable.  
        
      (3) The in vivo images show the interosseous membrane as high signal on both the shorter and longer TE images. The
      structure contains ordered collagen with fibres at different oblique angles to the radius and ulnar and thus
      potentially to B 0. Collagen fibres may have been at an orientation towards the magic angle and this may account
      for the high signal on the longer TE image, and the low signal on the subtracted image.  
        
      (4) Some of the signals attributed to muscle may be from an attachment of the muscle to aponeurosis.  
        
      (5) There is significant collagen in subcutaneous tissues so the designation "skin" may more correctly be "skin
      and subcutaneous tissue".  
        
      (6) Cortical bone is very heterogeneous with boundaries between hard bone and soft tissue with significant
      susceptibility differences between the two across a small distance. This might be another mechanism for ultrashort
      T 2 \* tissue values in addition to the presence of collagen. The two effects might be distinguished by also
      including a longer TE spin echo acquisition.  
        
      Solid cortical bone may also have an ultrashort T 2 \* in its own right.  
        
      (7) It may be worth noting that in disease T 2 \* may be increased. As a result, the subtraction image may make
      abnormal tissue less obvious than normal tissue. Magic angle effects may also produce this appearance.  
        
      (8) It may be worth distinguishing fibrous connective tissue (loose or dense) which may be normal or abnormal,
      from fibrosis which is abnormal accumulation of fibrous connective tissue in damaged tissue. Fibrosis typically
      has a longer T 2 initially and decreases its T 2 \* over time. In places, the context suggests that fibrous
      connective tissue may be more appropriate than fibrosis.  
        
      Overall, the paper appears very well constructed and describes thoughtful and important work.  
        
      Comments on revisions:  
        
      The responses to my criticisms are well thought out and are fine as far as I am concerned.

        
      I suggest in Figure 5 line 6 changing "trabecular bone" to "trabecular bone marrow".
