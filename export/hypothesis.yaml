      > 13. *As no macroscopic images depicting tumor nodules from the implantation of AsPC-1 and PANC-1 tumor cells
      into the CAM were provided.*




      __Response__: A new figure (now Figure 1) has been added with macroscopic images of PANC-1 and BxPC-3 tumours in
      situ at ED14. Successful tumour grafting of AsPC-1 cells was demonstrated via the histological images provided
      throughout the manuscript.


      > 

      > 14. *A newly identified biological phenomenon: non-nuclear EdU accumulation in chicken embryonic cells," is not
      well supported unless compelling evidence is presented to establish that these cells indeed belong to chicken
      embryos*




      __Response__: We have clarified in the body of the text as well as in various figure legends that the apparent
      nucleoside presence within the cytoplasm of cells has been consistently observed also in liver sections taken from
      embryos that have not received tumour grafts.


      > 

      > *15. Lacking any demonstration of concurrent EdU accumulation alongside cytoplasmic and/or membrane staining
      within the same cells. The latter is quite feasible by staining the cells with a suitable agent (or fluorophore),
      such as...*




      __Response__: We agree with the reviewer that we have not performed dedicated staining for cytoplasmic or membrane
      components in order to demonstrate the colocalisation of the EdU signal with the . Though we believe that the
      simultaneously acquired brightfield images are sufficiently convincing that these signals localise to the
      cytoplasm rather than to the extracellular space. Additional experiments were performed with F-ara-EdU and
      BrdU/IdU labelling in non-grafted embryos which demonstrated the robustness of these findings and further point
      towards cytoplasmic rather than extracellular signal. Multiple new figures and paragraphs were added into the
      revised manuscript which support our claim.


      > 

      > 16. *Third, regarding "Extranuclear EdU staining": Extranuclear EdU staining is not a standard or typical...*




      __Response__: We agree that this is not the intended use of nucleoside incorporation assays (including halogenated
      analogues). With this manuscript we aimed to illustrate the unexpected findings that could lead to
      misinterpretation of experimental data as a consequence of a new biological phenomenon.


      > 

      > 16.1* Cellular damage or death: Cells that are dying or have been damaged may release their DNA, causing it to
      be detected outside the nucleus.*




      __Response__: The cells with apparent extranuclear (F-ara-)EdU, and BrdU and IdU) show no signs of nuclear
      pyknosis nor DNA fragmentation. In addition, we also describe this phenomenon in healthy developing embryos at
      various stages of development, in livers that show no macroscopic signs of tissue damage. Moreover, if the
      extranuclear EdU detection does signify degraded DNA (with the incorporated analogue), the remaining nuclear DNA
      would also show signs of (replication-dependent) EdU incorporation.


      > 

      > 16.2* Apoptosis: During apoptosis, cells undergo DNA degradation, and some DNA fragments may be found in the
      extranuclear space*




      __Response__: We would like to refer the reviewer to the reply above. It seems unlikely that from ED14 onwards
      such massive apoptotic evens would be taking place in healthy embryos. Moreover, nucleoside incorporation and
      (caspase-dependent) DNA fragment generation would need to take place within one hour (= a typical nucleoside
      labelling period).


      > 

      > 16.3 *Technical artifacts: Errors during cutting of formalin-fixed tissues, cell fixation, permeabilization, or
      the staining procedure itself can lead to mislocalization of the fluorescent signal.*




      __Response__: We agree that several technical reasons can lead to altered subcellular localisation during the
      detection of some (protein) markers. Iduring detection.6,7 In our experiments, tissues were fixed in ice-cold 4%
      formalin for at least 12 hours. Therefore, it is highly unlikely that insufficient fixation would have caused this
      phenomenon.


      Regarding the possibility that the staining procedure itself can lead to mislocalisation, it is important to note
      that the copper-catalysed click detection of EdU is not susceptible to many of the possible causes for altered
      epitope detection through standard immuno-labelling. We can also not conceive how the click-reaction, performed on
      formalin-fixed tissues, could induce a complete shift in EdU from the nuclear to the extranuclear compartment of
      these select cells only without any other alterations in the nuclear or cellular morphology. We have performed
      several control staining procedures, such as performing the click reaction on tissue sections of embryos that had
      not received any alkyne-containing nucleoside labelling. This did not result in the detection of any signal. These
      results are referred to in the manuscript.


      Lastly, the simultaneous presence of correctly localised (nuclear) (F-ara-)EdU and 'incorrectly' localised
      (F-ara-)EdU within the same tissue section, and across different tissue types (liver versus CAM xenograft)
      demonstrates that it is unlikely that the observed phenomenon is the result of a technical artifact.



      Yoshida, S. R., Maity, B. K. & Chong, S. Visualizing Protein Localizations in Fixed Cells: Caveats and the
      Underlying Mechanisms. *J. Phys. Chem. B* __127__, 4165-4173 (2023).

      Stadler, C., Skogs, M., Brismar, H., Uhlén, M. & Lundberg, E. A single fixation protocol for proteome-wide
      immunofluorescence localization studies. *J. Proteomics* __73__, 1067-1078 (2010).


      > 

      > 16.4 *Unique cell types: In some specific cell types, such as megakaryocytes, DNA or other nuclear components
      may be localized extranuclearly, leading to extranuclear staining with techniques like EdU.*




      __Response__: Referring to the paper of Lan et al. (2019; *doi: 10.1111/acel.12901*) to which the reviewer alluded
      by citing the following statement "*Nicked DNA was strongly visible in old cells, prominently in the cytosol, but
      undetectable in young cells, and was more intense in old cells upon" *, we would like to stress that these authors
      investigated the presence of dsDNA in various human cell lines *in vitro *through OTHER assays than nucleoside
      labelling. Additionally, in the cited paper, also no specific staining for cytoplasm or cell membranes was
      performed to accurately segment the nucleus versus cytoplasm. Lastly, the intense focal-like nucleoside signal we
      observe within our tissue sections does not resemble the ambiguous and apparently random signal localisation
      within the cytoplasm of the cells presented in the cited paper. Lastly, the reviewer seems not to be aware of the
      fact that megakaryocytes dot NOT occur in avian species.


      > 

      > *16.5 Extranuclear accumulation of histones and nucleosomes is an early event of apoptosis in human lymphoblasts
      (**https://doi.org/10.1136/ard.2003.011452**)*




      __Response__: The referred paper investigated cellular processes during cell death (apoptosis). Unfortunately, it
      does not present microscopic images to compare our data to; we therefore cannot assess its relevance to our
      findings.


      > 

      > *16.6 In some specific cell types, such as megakaryocytes, DNA or other nuclear components may be localized
      extranuclearly, leading to extranuclear staining with techniques like EdU [Frydman, G.H., Tessier, S.N., Wong,
      K.H.K. et al. Megakaryocytes*




      __Response__: As already mentioned above, to our knowledge, megakaryocytes have NOT been described or identified
      in avian species so far. Therefore, we disagree that the cited phenomenon/reference would be highly relevant for
      nucleoside accumulation in the cytoplasm of non-megakaryocyte cells in *in ovo* model systems. Furthermore, the
      paper by Frydman et al., does not describe the use of nucleoside labelling in these cells.


      > 

      > *16.7 However, since the authors do not present any absolute markers proving that EdU-cyto+ cells are EdU+
      chicken granulocytes, the authors' statement that "Given the high number of EdU+ granulocytes observed, it is more
      likely that these are neutrophils rather than eosinophils" appears highly speculative.*




      __Response__: We agree with the reviewer that our claim that EdU-cyto+ cells represent granulocytes is still
      speculative. However, concerning the exact wording; brightfield images did show colocalisation of the nucleoside
      signal within the cytoplasm of granule-containing chicken cells. We have emphasized more clearly within the
      discussion section that the extranuclear nucleoside signal is highly unlikely to be nucleoside-containing DNA.
      Additional experiments were conducted to investigate whether these cells represent chicken thrombocytes, known to
      possess phagocytotic functionality. IF staining for CD41/CD61 as a marker for thrombocytes revealed that
      CD41/CD61-positive cells do not exhibit the alluded phenomenon. A new figure, Figure 10 illustrates this finding.


      > 

      > __Methodological ambiguities__




      > 

      > 1. In the section "Nucleoside labeling of dividing cells in the CAM model": It is not clear when BrdU and EdU
      were given after tumor cell implantation, or how to standardize the

      > distance from the tumor as suggested by "...as far away from the visible tumor as possible...". I question
      whether such a "precise" description of the application site would contribute "...to ensure low variability

      > in labeling duration...", especially when it was performed by two independent researchers "...in tandem,
      ensuring that an experimental group of 16 embryos could be labeled in less than five minutes."




      __Response__:


      In this manuscript, we have described nucleoside labelling in grafted embryos as well as in non-grafted embryos.
      Alongside depictions of nucleoside labelling, the embryonic day at which the assay was performed is mentioned in
      the figure legend of all figures demonstrating nucleoside labelling. For example, BrdU labelling of the BxPC-3
      xenograft presented in Figure 2 (revised manuscript) was performed at ED13 (which is 5 days following the grafting
      procedure at ED7). In the revised manuscript, we have ensured that for each labelling depicted, its timing in the
      developmental period is explicitly mentioned. Nucleoside labelling in non-grafted embryos was performed throughout
      various stages of development; the timing of the assay is now also mentioned in the corresponding figure legends.


      We fully agree that there is still room for improvement concerning the standardisation of the application of the
      labelling solution onto the CAM. The main aim of the present manuscript, however, is to demonstrate the
      feasibility of this labeling protocol. In addition, we report the unexpected but important finding of cytoplasmic
      accumulation due to a possible biological cause. In this respect we rephrased the text and pointed to a potential
      pitfall of the application in the CAM model so that future studies can anticipate to misinterpretations.


      > 

      > 2. In the section "Immunofluorescence labeling of cryosections: "...a blocking and permeabilizing solution in a
      humidified atmosphere."" ... :

      > Absence of detergent is used during incubation with primary and secondary antibodies (even the widely
      recommended Tween20!). I wonder whether it might be the source of non-specific tissue labelling by

      > donkey anti-chicken IgY that was considered as an evidence of chicken origin.




      __Response__: We interpreted this as that the reviewer concluded that we applied our primary and secondary
      antibody staining procedures in the presence of Triton X-100. We can assure that following the initial blocking
      incubation step and three rinses with PBS, all subsequent antibody labelling procedures (primary or secondary) are
      performed in the absence of detergent within the staining buffer. This was mentioned in the second paragraph under
      the heading "__Immunofluorescence ______labelling of cryosections" ____in the Materials & Methods section.


      > 

      > __Referee #3__




      > 

      > __Major comments__




      > 

      > 1. The current manuscript lacked figure panels to show the quantification results of the labeling to convincedly
      demonstrate the positive correlation between the nucleoside labeling

      > versus Ki67. Bar charts with statistical analysis should be included. The study utilized 2 human cancer cell
      lines as an example. T




      __Response__: We have added quantification data of EdU and Ki-67 across several BxPC-3 xenografts and added
      statistical analysis in Figure 4E.


      > 

      > 2. The study would be improved if the authors could include cancer cell lines that

      > are known to be highly proliferative vs slowly proliferative to demonstrate the robustness of this method.




      __Response__: We do not expect failure of nucleoside labelling due to tumour cell-line dependent characteristics
      for several reasons. For instance, when performing EdU labelling *in vitro*, initial dose-and duration titration
      are recommended to establish satisfactory labelling efficiency for the research hypothesis in question. In our
      research, we are predominantly focusing on relatively short-lived effects of treatments on S-phase progression and
      therefore prefer to apply labelling (*in vitro* and *in ovo*) for durations of less than 60 minutes. In contrast,
      extended labelling durations of several hours will allow one to capture replication even in very slowly
      proliferating (cancer) cells at the cost of temporal resolution. Importantly, the growth rates of individual cell
      lines within the CAM model may differ from their behaviour *in vitro*. Additionally, long duration nucleoside
      (EdU) labelling may induce additional toxicity. Alternative analogues such as F-ara-EdU with improved safety
      profiles for long labelling durations should then be considered. In the revised manuscript, labelling with
      BrdU/IdU as well as F-ara-EdU of non-grafted chicken tissues were added which demonstrate the robustness of the
      application of the technique in the CAM model. Longer-term labelling of lowly proliferative cells can be achieved
      with F-ara-EdU to minimise embryo (and tumour cell) toxicity which will extend the application potential of the
      described .


      In summary, labelling parameters should be optimised for each specific research question, but nucleoside
      incorporation remains a gold standard for identifying S-phase progression across diverse cell types. Given that we
      successfully established its feasibility in the CAM model, there is no biological reason to suggest it would not
      be equally valid for any proliferating cancer cell line.
