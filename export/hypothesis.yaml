  annotation_39:
    id: BFYJQD79EfGZi1vm-VDWZw
    content: "**Note:** This preprint has been reviewed by subject experts for *Review Commons*. Content has not been altered except for formatting.\n\nLearn more at [Review Commons](https://reviewcommons.org)\n\n\n-----\n\n\n### Referee \\#2\n\n#### Evidence, reproducibility and clarity\n\n An intriguing article, \"Application of Nucleoside Analogue Labelling to Study the Cell Cycle of Xenografted PDAC Cell Lines in the Chorioallantoic Membrane Model,\" explores the overlooked potential of the chorioallantoic membrane (CAM) model as an innovative alternative in the realm of cell cycle research related to tumor xenografts. The authors were resolute in their pursuit of evidence to bolster their fascinating hypothesis, which posits that exposure to nucleosides enhances the labelling of nucleosides with 5-ethynyl-2'-deoxyuridine (EdU). This improvement allows effective multiplexing with cell-cycle markers like cyclin B1 and Ki67, especially when combined with advanced digital image analysis. They claimed that accurately separating human and chicken cells allowed them to identify a specific type of chicken embryonic cell with a high level of extranuclear EdU accumulation.\r\nResearchers propose that cells without chicken MHC II are likely to be non-proliferating granulocytes found in the embryonic liver of both grafted and non-grafted embryos, including xenograft tissues. According to the authors, the CAM xenograft model effectively helps in studying tumor cell cycles in live conditions. \r\nBehind, authors claim a novel biological phenomenon, namely that of extranuclear nucleoside accumulation in certain chicken embryonic cells. If the authors successfully prove their hypothesis, it will significantly confirm CAM as a unique in vivo tool for better immuno-/histological exams and more precise cell cycle assessments compared to standard rodent models. The research encourages greater use of this alternative animal model in cancer studies to help us understand the regulation of the cancer cell cycle. This, in turn, may improve the implementation of existing treatment methods or uncover potential vulnerabilities in the cancer cell cycle. \r\n\r\nUnfortunately, in this article, the authors do not provide sufficiently convincing evidence of the hypothesis postulated by them. The manuscript's clinical relevance is limited, and methodological flaws prevent proper statistical validation of the in vitro findings. My questions and remarks below are designed to find undeniable proof or opposing views that back the authors' key perspective.\r\n\r\n**Major - Conceptual:**\r\n\r\nPoint 1 - In Result section: The entire article is based on the assertion that \"... distinguishing between both species can already be achieved to a large extent in a relatively simple manner through the use of anti-chicken IgY fluorophore-conjugated antibodies, which are routinely used only as secondary antibodies. In doing so, cellular as well as acellular chicken embryonic components are stained (Figure 7).\" This assumption seems off, as anti-chicken IgY staining is employed in research to detect chicken antibodies (IgY). \r\nThis secondary antibody is designed to specifically bind to the IgY immunoglobulin in chickens, targeting both heavy and light chains. A donkey anti-chicken IgY antibody labels chicken tissues to identify cells that express chicken IgY immunoglobulins. It's clear that not every cell in a chicken embryo tissues produces IgY immunoglobulins. Hence, cells stained by donkey anti-chicken IgY FITC-conjugated antibody cannot represent all chicken tissue cells.\r\nLastly, the use of the green fluorescence channel is often unfounded, considering that there are always cells with non-specific and considerably high fluorescence levels in this area of the spectrum. The latter is actually confirmed by the authors in Fig. 7 in the form of the following sentence: \"Highly autofluorescent (nucleated) embryonic erythrocytes can be observed throughout the tissue (arrowheads).\" However, even here, the authors do not provide any evidence that these are erythrocytes and not some other cells.\r\n\r\nPoint 2 - In their article, the authors consistently emphasize how their method excels in differentiating human tumor cells from the abundant chicken embryonic cells that encase the tumor. Nonetheless, the authors fail to present direct evidence regarding the identity of the nuclei or cells in question, nor do they substantiate the validity of the algorithm selected for processing digital images of fluorescently labeled cells, which would be essential for discerning their origin, whether chicken or human. Given the importance of the authors' subsequent conclusions, such evidence should be provided, at least for initial validation. Antibodies for chicken nuclear antigens are well established [e.g., Kane, C. M., Cheng, P. F., Burch, J. B., & Weintraub, H. (1982). Tissue-specific and species-specific monoclonal antibodies to avian red cell nuclear proteins. Proceedings of the National Academy of Sciences of the United States of America, 79(20), 6265-6269. https://doi.org/10.1073/pnas.79.20.6265], and I recommend the authors use these instead of the fluorescein-labeled donkey anti-chicken IgY antibodies, which were misused.\r\nOn the same matter, the article doesn't clarify if the antibodies for Ki67 and cyclin B1 can differentiate between human and chicken antigens. \r\nWhy is there no staining with antibodies to human antigens for tumor cell identification in Figures 1-2?\r\nWhat specific markers in Fig. 4 should lead the reader to conclude that the nuclei pointed out by the arrows represent embryonic epithelial nuclei (EE), nuclei of chicken embryonic blood cells (EB), and human AsPC-1 tumor xenograft nuclei (T)?\r\nThe nuclei shown in this same figure, which supposedly display mitotic figures of dividing tumor nuclei and can also be clearly distinguished (M), actually more closely resemble giant multinucleated cells. However, their affiliation with either chicken or human tumor cells is neither obvious nor proven.\r\nThe statement \"After immunolabeling for human Ki67, we confirmed that all EdU+ xenograft nuclei were also Ki67+, confirming the specificity and compatibility of both labeling strategies in CAM xenograft tumor cells (Figure 5)\" is not supported by the image, which shows that the majority of Ki67-positive nuclei are EdU-negative.\r\nThe caption for Figure 6 needs to be revised, particularly the statement \"Combined, these markers allow in ovo segregation of proliferating tumor cells into early S-phase (ES, EdU+), late S or early G2 (LS, EdU+CB1+), and G2 (EdU-CB1+)\". The authors' method for labeling cells should consider that the location of cyclin B1 is key to determining a cell's stage in the cell cycle:\r\no Cytoplasmic: Associated with G2/M arrest.\r\no Nuclear: Associated with the transition into mitosis and the G2 to M phase.\r\nThe assertion that \"Species-distinction can be further facilitated by combining anti-chicken IgY IF (Figure 8C) with additional anti-human IF, such as anti-human Ki67 (Figure 8D)\" lacks clarity, as the images in Figure 8 do not support the authors' claim. What do the pink cell nuclei in Figures 8 and 9 represent?\r\nIn Fig. 10, it is impossible to see the yellow line, which, according to the authors' statement \"... yellow lines indicate the area classified as tumor\", should indicate the tumor origin of the cells!\r\nThere is a distinct lack of evidence in Figures 11A-C suggesting that the S-phase nuclei are attributed to both embryonic liver epithelial cells (ES) and BxPC-3 cells (BS). Furthermore, there is no evidence that the apparent cytoplasmic EdU inclusions (arrowheads) belong specifically to chicken embryonic cells. Furthermore, in Fig. 11 B and C, the equal magnification of 40x is apparently incorrectly written.\r\n\r\nDiscussion section:\r\n\r\nThe initial assertion made by the authors, \"In this paper, we have demonstrated that our previously published protocol concerning the xenografting of the BxPC-3 cell line10 can be applied to the AsPC-1 and PANC-1 cell lines,\" seems inadequately supported, as no macroscopic images depicting tumor nodules from the implantation of AsPC-1 and PANC-1 tumor cells into the CAM were provided.\r\n\r\nThe authors' second assertion, \"A newly identified biological phenomenon: non-nuclear EdU accumulation in chicken embryonic cells,\" is not well supported unless compelling evidence is presented to establish that these cells indeed belong to chicken embryos. Moreover, the assertion regarding non-nuclear EdU accumulation seems to be speculative, lacking any demonstration of concurrent EdU accumulation alongside cytoplasmic and/or membrane staining within the same cells. The latter is quite feasible by staining the cells with a suitable agent (or fluorophore), such as fluorophore-conjugated Phalloidin for the cytoskeleton or PKH26 (https://www.sigmaaldrich.com/RU/en/product/sigma/pkh26gl?srsltid=AfmBOorEbKBTeYSCKZY6qs-pWjCZCg4lhOvNqE0YYByS2A545f-POa24) for membrane structures.\r\n\r\nThird, regarding \"Extranuclear EdU staining\": Extranuclear EdU staining is not a standard or typical application for the EdU (5-ethynyl-2&#x2032;-deoxyuridine) assay, which is designed to label and detect newly synthesized DNA in the nucleus during the S-phase of the cell cycle. Extranuclear EdU staining likely refers to a misinterpretation or unusual experimental result where EdU or its detection reaction product is found outside the nucleus. This could be due to cell damage, processing issues, tissue cutting artefacts or a cell type with unique DNA localization, as seen in some contexts of apoptosis or extranuclear DNA accumulation. Potential reasons for extranuclear EdU staining may include, but not limited to:\r\n\r\n-\tCellular damage or death: Cells that are dying or have been damaged may release their DNA, causing it to be detected outside the nucleus.\r\n&#x2022;\tApoptosis: During apoptosis, cells undergo DNA degradation, and some DNA fragments may be found in the extranuclear space.\r\n-\tTechnical artifacts: Errors during cutting of formalin-fixed tissues, cell fixation, permeabilization, or the staining procedure itself can lead to mislocalization of the fluorescent signal.\r\n-\tUnique cell types: In some specific cell types, such as megakaryocytes, DNA or other nuclear components may be localized extranuclearly, leading to extranuclear staining with techniques like EdU.\r\nSeveral examples: \r\n-\tNicked DNA was strongly visible in old cells, prominently in the cytosol, but undetectable in young cells, and was more intense in old cells upon induction of DNA damage by the DNA damaging agent cytarabine/Ara&#x2010;C which causes DSBs [Lan YY, Heather JM, Eisenhaure T, Garris CS, Lieb D, Raychowdhury R, Hacohen N. Extranuclear DNA accumulates in aged cells and contributes to senescence and inflammation. Aging Cell. 2019 Apr;18(2):e12901. doi: 10.1111/acel.12901].\r\n-\tExtranuclear accumulation of histones and nucleosomes is an early event of apoptosis in human lymphoblasts. [Gabler, C., Blank, N., Hieronymus, T., Schiller, M., Berden, J. H., Kalden, J. R., & Lorenz, H. M. (2004). Extranuclear detection of histones and nucleosomes in activated human lymphoblasts as an early event in apoptosis. Annals of the rheumatic diseases, 63(9), 1135-1144. https://doi.org/10.1136/ard.2003.011452]\r\n-\tIn some specific cell types, such as megakaryocytes, DNA or other nuclear components may be localized extranuclearly, leading to extranuclear staining with techniques like EdU [Frydman, G.H., Tessier, S.N., Wong, K.H.K. et al. Megakaryocytes contain extranuclear histones and may be a source of platelet-associated histones during sepsis. Sci Rep 10, 4621 (2020). https://doi.org/10.1038/s41598-020-61309-3].\r\n\r\nI would, if I could, strongly concur with the statements made by the authors: \"It is also evident that the presence of EdU-cyto+ cells is not confined to the liver, as they were also found within the CAM. These cells likely represent a ubiquitously distributed cell population present in both healthy and xenografted chicken embryos,\" and \"...since EdU-cyto+ cells are consistently present in non-grafted embryos as well, the phenomenon is not triggered by xenografting or the presence of PDAC cells.\" However, since the authors do not present any absolute markers proving that EdU-cyto+ cells are EdU+ chicken granulocytes, the authors' statement that \"Given the high number of EdU+ granulocytes observed, it is more likely that these are neutrophils rather than eosinophils\" appears highly speculative.\r\n\r\nFourth, regarding Ki67 staining: Careful consideration and robust validation are essential when drawing conclusions and interpretations about Ki67's role in cell proliferation and the cell cycle.\r\nResearch shows that Ki-67, an important cell cycle marker, has two main splice variants, &#x03B1; and &#x03B2;, which are regulated differently in normal and cancer cells at mRNA and protein levels.  Moreover, Ki-67 undergoes constant regulation and degradation through the proteasome system in both cell types, indicating a dynamic control mechanism for this protein. It was also observed a putative extranuclear elimination pathway of Ki-67, where it is transported to the Golgi apparatus. Furthermore, the unforeseen extranuclear removal of Ki-67 strongly indicates the necessity to examine this protein beyond the confines of the \"nuclear box,\" a perspective that has been overlooked until now [see e.g., Chierico L, Rizzello L, Guan L, Joseph AS, Lewis A, Battaglia G (2017) The role of the two splice variants and extranuclear pathway on Ki-67 regulation in non-cancer and cancer cells. PLoS ONE 12(2): e0171815. https://doi.org/10.1371/journal.pone.0171815].\r\n\r\nLast but not least, regarding the authors' conclusion: \"We report a novel phenomenon: the apparent cytoplasmic accumulation of EdU in nondividing chicken granulocytes.\" The phenomenon of DNA replication taking place in the cytoplasm is not a novel observation. In instances like replication stress, the cytosol can initiate a response pathway that encompasses the detection of cytosolic DNA and subsequent signaling processes focused on genome protection. Cytosolic DNA generated after replication stress activates a Ca2+-dependent pathway to protect stalled replication forks [Li, S., Lu, H. T., & You, Z. (2025). Cytosolic DNA and intracellular Ca2+: Maintaining genome stability during replication stress. DNA repair, 152, 103877. https://doi.org/10.1016/j.dnarep.2025.103877].\r\n Damage to the DNA template caused by environmental pollutants, like radiation and genotoxic chemicals, can impede the replication process.Physiological stressors also affect fork dynamics, including metabolic byproducts like reactive oxygen species, conflicts in replication and transcription, repetitive DNA elements such as telomeres, sequences that form secondary structures, DNA-RNA hybrids, misincorporated ribonucleotides, and low availability of DNA precursors. In response to these challenges, cells have developed an intricate network of surveillance and repair mechanisms. They identify replication stress, support stalled forks, fix problems, and allow replication to proceed. These pathways are crucial for maintaining genome stability and ensuring proper cellular function. Several excellent reviews on the topic included [M.R. Higgs\r\nBOD1L is required to suppress deleterious resection of stressed replication forks\r\nMol. Cell (2015)\r\nR. Kumar et al.\r\nRIF1: a novel regulatory factor for DNA replication and DNA damage response signaling\r\nDNA Repair(2014)\r\nW. Leung\r\nATR protects ongoing and newly assembled DNA replication forks through distinct mechanisms\r\nCell Rep.(2023)\r\nM.B. Adolph et al.\r\nMechanisms and regulation of replication fork reversal\r\nDNA Repair (Amst. )(2024)\r\nZ. You et al.\r\nThe role of single-stranded DNA and polymerase alpha in establishing the ATR, Hus1 DNA replication checkpoint\r\nJ. Biol. Chem.(2002)\r\nA. Kumagai\r\nTopBP1 activates the ATR-ATRIP complex\r\nCell(2006)\r\nJ. Lee et al.\r\nThe Rad9-Hus1-Rad1 checkpoint clamp regulates interaction of TopBP1 with ATR\r\nJ. Biol. Chem.(2007)].\r\nTo validate the authors' conclusions regarding the presence or absence of the declared phenomenon, I would recommend modulating TREX1 expression. Overexpression of TREX1, a nuclease that degrades cytosolic DNA, suppresses TRPV2-mediated Ca2+ release under replication stress. TREX1 depletion, however, leads to cytosolic DNA accumulation.\r\n\r\nMethodological ambiguities:\r\nIn the section \"Nucleoside labeling of dividing cells in the CAM model\":\r\nIt is not clear when BrdU and EdU were given after tumor cell implantation, or how to standardize the distance from the tumor as suggested by \"...as far away from the visible tumor as possible...\". I question whether such a \"precise\" description of the application site would contribute \"...to ensure low variability in labeling duration...\", especially when it was performed by two independent researchers \"...in tandem, ensuring that an experimental group of 16 embryos could be labeled in less than five minutes.\"\r\n\r\nIn the section \"Immunofluorescence labeling of cryosections\":\r\n\"...a blocking and permeabilizing solution in a humidified atmosphere.\" This solution is comprised of final concentrations of 0.1% Triton-X-100, 0.02% sodium azide, 5% horse serum (Sigma-Aldrich, Cat#H1270), 0.01% thimerosal, and 0.3% bovine serum albumin (Sigma-Aldrich, Cat#A7284) in PBS at pH 7.4.\"\r\nAbsence of detergent is used during incubation with primary and secondary antibodies (even the widely recommended Tween20!). I wonder whether it might be the source of non-specific tissue labelling by donkey anti-chicken IgY that was considered as an evidence of chicken origin.\r\n\n\n#### Significance\n\n *General asssesment:*\r\n\r\nThe research has technical significance, and encourages greater use of this alternative animal model in cancer studies to help us understand the regulation of the cancer cell cycle. This, in turn, may improve the implementation of existing treatment methods or uncover potential vulnerabilities in the cancer cell cycle. No clinical significance so far. Certan groups conducting cancer biology studies and modelling might be interested in implementation of the described method, although it will be challenging without macroscopic evidence of the expected tumor nodules.The data and the methods presented in such a way that reproducing them might be challenging.The experiments are not adequately replicated and statistical analysis inadequate.\n\n"
    description: "**Note:** This preprint has been reviewed by subject experts for *Review Commons*. Content has not been altered except for formatting.\n\nLearn more at [Review Commons](https://reviewcommons.org)\n\n\n-----\n\n\n### Referee \\#2\n\n#### Evidence, reproducibility and clarity\n\n An intriguing article, \"Application of Nucleoside Analogue Labelling to Study the Cell Cycle of Xenografted PDAC Cell Lines in the Chorioallantoic Membrane Model,\" explores the overlooked potential of the chorioallantoic membrane (CAM) model as an innovative alternative in the realm of cell cycle research related to tumor xenografts. The authors were resolute in their pursuit of evidence to bolster their fascinating hypothesis, which posits that exposure to nucleosides enhances the labelling of nucleosides with 5-ethynyl-2'-deoxyuridine (EdU). This improvement allows effective multiplexing with cell-cycle markers like cyclin B1 and Ki67, especially when combined with advanced digital image analysis. They claimed that accurately separating human and chicken cells allowed them to identify a specific type of chicken embryonic cell with a high level of extranuclear EdU accumulation.\r\nResearchers propose that cells without chicken MHC II are likely to be non-proliferating granulocytes found in the embryonic liver of both grafted and non-grafted embryos, including xenograft tissues. According to the authors, the CAM xenograft model effectively helps in studying tumor cell cycles in live conditions. \r\nBehind, authors claim a novel biological phenomenon, namely that of extranuclear nucleoside accumulation in certain chicken embryonic cells. If the authors successfully prove their hypothesis, it will significantly confirm CAM as a unique in vivo tool for better immuno-/histological exams and more precise cell cycle assessments compared to standard rodent models. The research encourages greater use of this alternative animal model in cancer studies to help us understand the regulation of the cancer cell cycle. This, in turn, may improve the implementation of existing treatment methods or uncover potential vulnerabilities in the cancer cell cycle. \r\n\r\nUnfortunately, in this article, the authors do not provide sufficiently convincing evidence of the hypothesis postulated by them. The manuscript's clinical relevance is limited, and methodological flaws prevent proper statistical validation of the in vitro findings. My questions and remarks below are designed to find undeniable proof or opposing views that back the authors' key perspective.\r\n\r\n**Major - Conceptual:**\r\n\r\nPoint 1 - In Result section: The entire article is based on the assertion that \"... distinguishing between both species can already be achieved to a large extent in a relatively simple manner through the use of anti-chicken IgY fluorophore-conjugated antibodies, which are routinely used only as secondary antibodies. In doing so, cellular as well as acellular chicken embryonic components are stained (Figure 7).\" This assumption seems off, as anti-chicken IgY staining is employed in research to detect chicken antibodies (IgY). \r\nThis secondary antibody is designed to specifically bind to the IgY immunoglobulin in chickens, targeting both heavy and light chains. A donkey anti-chicken IgY antibody labels chicken tissues to identify cells that express chicken IgY immunoglobulins. It's clear that not every cell in a chicken embryo tissues produces IgY immunoglobulins. Hence, cells stained by donkey anti-chicken IgY FITC-conjugated antibody cannot represent all chicken tissue cells.\r\nLastly, the use of the green fluorescence channel is often unfounded, considering that there are always cells with non-specific and considerably high fluorescence levels in this area of the spectrum. The latter is actually confirmed by the authors in Fig. 7 in the form of the following sentence: \"Highly autofluorescent (nucleated) embryonic erythrocytes can be observed throughout the tissue (arrowheads).\" However, even here, the authors do not provide any evidence that these are erythrocytes and not some other cells.\r\n\r\nPoint 2 - In their article, the authors consistently emphasize how their method excels in differentiating human tumor cells from the abundant chicken embryonic cells that encase the tumor. Nonetheless, the authors fail to present direct evidence regarding the identity of the nuclei or cells in question, nor do they substantiate the validity of the algorithm selected for processing digital images of fluorescently labeled cells, which would be essential for discerning their origin, whether chicken or human. Given the importance of the authors' subsequent conclusions, such evidence should be provided, at least for initial validation. Antibodies for chicken nuclear antigens are well established [e.g., Kane, C. M., Cheng, P. F., Burch, J. B., & Weintraub, H. (1982). Tissue-specific and species-specific monoclonal antibodies to avian red cell nuclear proteins. Proceedings of the National Academy of Sciences of the United States of America, 79(20), 6265-6269. https://doi.org/10.1073/pnas.79.20.6265], and I recommend the authors use these instead of the fluorescein-labeled donkey anti-chicken IgY antibodies, which were misused.\r\nOn the same matter, the article doesn't clarify if the antibodies for Ki67 and cyclin B1 can differentiate between human and chicken antigens. \r\nWhy is there no staining with antibodies to human antigens for tumor cell identification in Figures 1-2?\r\nWhat specific markers in Fig. 4 should lead the reader to conclude that the nuclei pointed out by the arrows represent embryonic epithelial nuclei (EE), nuclei of chicken embryonic blood cells (EB), and human AsPC-1 tumor xenograft nuclei (T)?\r\nThe nuclei shown in this same figure, which supposedly display mitotic figures of dividing tumor nuclei and can also be clearly distinguished (M), actually more closely resemble giant multinucleated cells. However, their affiliation with either chicken or human tumor cells is neither obvious nor proven.\r\nThe statement \"After immunolabeling for human Ki67, we confirmed that all EdU+ xenograft nuclei were also Ki67+, confirming the specificity and compatibility of both labeling strategies in CAM xenograft tumor cells (Figure 5)\" is not supported by the image, which shows that the majority of Ki67-positive nuclei are EdU-negative.\r\nThe caption for Figure 6 needs to be revised, particularly the statement \"Combined, these markers allow in ovo segregation of proliferating tumor cells into early S-phase (ES, EdU+), late S or early G2 (LS, EdU+CB1+), and G2 (EdU-CB1+)\". The authors' method for labeling cells should consider that the location of cyclin B1 is key to determining a cell's stage in the cell cycle:\r\no Cytoplasmic: Associated with G2/M arrest.\r\no Nuclear: Associated with the transition into mitosis and the G2 to M phase.\r\nThe assertion that \"Species-distinction can be further facilitated by combining anti-chicken IgY IF (Figure 8C) with additional anti-human IF, such as anti-human Ki67 (Figure 8D)\" lacks clarity, as the images in Figure 8 do not support the authors' claim. What do the pink cell nuclei in Figures 8 and 9 represent?\r\nIn Fig. 10, it is impossible to see the yellow line, which, according to the authors' statement \"... yellow lines indicate the area classified as tumor\", should indicate the tumor origin of the cells!\r\nThere is a distinct lack of evidence in Figures 11A-C suggesting that the S-phase nuclei are attributed to both embryonic liver epithelial cells (ES) and BxPC-3 cells (BS). Furthermore, there is no evidence that the apparent cytoplasmic EdU inclusions (arrowheads) belong specifically to chicken embryonic cells. Furthermore, in Fig. 11 B and C, the equal magnification of 40x is apparently incorrectly written.\r\n\r\nDiscussion section:\r\n\r\nThe initial assertion made by the authors, \"In this paper, we have demonstrated that our previously published protocol concerning the xenografting of the BxPC-3 cell line10 can be applied to the AsPC-1 and PANC-1 cell lines,\" seems inadequately supported, as no macroscopic images depicting tumor nodules from the implantation of AsPC-1 and PANC-1 tumor cells into the CAM were provided.\r\n\r\nThe authors' second assertion, \"A newly identified biological phenomenon: non-nuclear EdU accumulation in chicken embryonic cells,\" is not well supported unless compelling evidence is presented to establish that these cells indeed belong to chicken embryos. Moreover, the assertion regarding non-nuclear EdU accumulation seems to be speculative, lacking any demonstration of concurrent EdU accumulation alongside cytoplasmic and/or membrane staining within the same cells. The latter is quite feasible by staining the cells with a suitable agent (or fluorophore), such as fluorophore-conjugated Phalloidin for the cytoskeleton or PKH26 (https://www.sigmaaldrich.com/RU/en/product/sigma/pkh26gl?srsltid=AfmBOorEbKBTeYSCKZY6qs-pWjCZCg4lhOvNqE0YYByS2A545f-POa24) for membrane structures.\r\n\r\nThird, regarding \"Extranuclear EdU staining\": Extranuclear EdU staining is not a standard or typical application for the EdU (5-ethynyl-2&#x2032;-deoxyuridine) assay, which is designed to label and detect newly synthesized DNA in the nucleus during the S-phase of the cell cycle. Extranuclear EdU staining likely refers to a misinterpretation or unusual experimental result where EdU or its detection reaction product is found outside the nucleus. This could be due to cell damage, processing issues, tissue cutting artefacts or a cell type with unique DNA localization, as seen in some contexts of apoptosis or extranuclear DNA accumulation. Potential reasons for extranuclear EdU staining may include, but not limited to:\r\n\r\n-\tCellular damage or death: Cells that are dying or have been damaged may release their DNA, causing it to be detected outside the nucleus.\r\n&#x2022;\tApoptosis