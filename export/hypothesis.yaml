  annotation_30:
    id: oQC2Sj8DEfGgU_-vzHsMZA
    content: >-
      **Reviewer #3 (Public review):**


      Summary:


      In this submission, Wang and colleagues jointly examine the association between depression and anxiety symptoms
      and individuals' affective reactivity to reward prediction errors in Ruttledge et al.'s gambling paradigm. Taking
      a bifactor approach to anxiety and depression in several non-clinical (and one clinical sample), the authors find
      that anxiety-specific symptoms relate to over-reactivity of mood to reward prediction errors (RPEs) as well as
      heightened mood variability, while depression-specific symptoms relate to blunted mood sensitivity to RPEs. These
      depression- but not anxiety-specific relationships replicated in patient samples.


      Strengths:


      I was impressed that the data-driven, transdiagnostic approach employed by the authors uncovered specific
      relationships between anxiety and depression-specific factors and RPE reactivity in a well characterized task and
      computational model, especially in a non-clinical sample. This sheds new light on how these affective processes
      may be perturbed-and importantly, in different ways-by anxiety and depression symptoms. Likewise, the replication
      of the depression-specific finding (RPE hypo-reactivity) in a clinical sample was nice to see.


      Weaknesses:


      (1) While the anxiety- and depression-specific factors had differential effects on mood variability (Figure 2A-D)
      and RPE reactivity (Figure 2E-G) in all samples, such that the correlations between the two factors and these mood
      parameters were significantly different, the anxiety factor was not consistently (significantly) associated with
      either mood-related parameter across samples. However, the authors resolve anxiety-specific predictive effects
      when they collapse across datasets. While it is intuitive that achieving a larger effective sample size would
      afford the power necessary to detect such individual differences, this struck me as a major caveat for this set of
      results.


      (2) The authors observe associations between the 'common factor' of depression and anxiety and risk-attitude
      tendencies, presumably the alpha (exponent) parameter in a prospect theory-type subjective value model. But where
      is this analysis explained? (i.e. how was this model formulated and how were risk attitude parameters estimated?)
      And what is the interpretation of this finding - is there precedent for looking at risk attitudes in this task?
      And why would these predictive effects only be observed in relation to the common, but not unique, factors of
      anxiety and depression? 
