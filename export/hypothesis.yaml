  annotation_86:
    id: SeVaED7zEfGK-DN34aojZw
    content: >-
      **eLife Assessment**  
        
      This fundamental study provides a major contribution to our understanding of Amyotrophic Lateral Sclerosis (ALS)
      pathogenesis by utilizing a primate model that overcomes the historical limitations of rodent paradigms. By
      demonstrating the retrograde and trans-synaptic spread of pathological TDP-43 from the periphery to the spinal
      cord and motor cortex, the authors propose a new model for the disease spreading. The evidence supporting these
      findings is compelling, characterized by rigorous post-mortem histological observations. This work will be of
      profound interest to neuroscientists and translational researchers seeking to decode the mechanisms of systemic
      disease progression in ALS.
