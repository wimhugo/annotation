  annotation_89:
    id: SWIPjj7zEfGMthPv24-nRQ
    content: >-
      **Reviewer #3 (Public review):**  
        
      Summary:  
        
      In this paper by Jones and colleagues, a non-human primate model is described in which wild-type TDP-43 is
      expressed in the cervical spinal cord. This gave rise to loss of motor neurons in the ventral horn at that level
      in the cervical spinal cord. MRI of the muscles allowed to see increased intensity in the mostly affected
      brachioradialis muscle, suggesting this muscle becomes denervated. At the neuropathological level, TDP-43 and
      pTDP-43 staining in the cytoplasm is increased, not only at the specific level of the cervical spinal cord, but
      also at a distance.  
        
      Strengths:  
        
      A clear strength is the state-of-the art focal expression of the TDP-43 transgene at a focal site in the cervical
      spinal cord. This is achieved by combining a general expression of a flipped loxP flanked TDP-43 vector using AAV9
      intrathecal administration, followed by an intramuscular AAV2 hSyn CRE-TdTomato vector in the brachioradialis
      muscle in order to induce focal recombination and expression of TDP-43 in motor neurons innervating this muscle on
      one side.  
        
      Another strength is the non-human primate background, which is much closer to the human situation.  
        
      Weaknesses:  
        
      Given the complexity and cost of the model, the n is very low.  
        
      The design of the experiments and the results shown about the toxicity induced by this focal TDP-43 expression do
      not allow us to conclude that it is a good model for ALS for several reasons. It is not clear that the TDP-43
      overexpression results in spreading weakness or in spreading motor neuron loss. The neuropathological changes
      described suggest that there is a kind of stress response, which extends to regions away from the site of primary
      damage, but more is needed to provide convincing evidence that there is spreading of disease pathology reminiscent
      of human ALS.
