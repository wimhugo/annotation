  annotation_18:
    id: U8Mz-D8NEfGYDpt-EK-Hdw
    content: >-
      **Reviewer #1 (Public review):**  
        
      Summary:  
        
      The aim of this work is to directly image collagen in tissue using a new MRI method with positive contrast. The
      work presents a new MRI method that allows very short, powerful radio frequency (RF) pulses and very short
      switching times between transmission and reception of radio frequency signals.  
        
      Strengths:  
        
      The experiments with and without removal of 1H hydrogen, which is not firmly bound to collagen, on tissue samples
      from tendons and bones are very well suited to prove the detection of direct hydrogen signals from collagen. The
      new method has great potential value in medicine, as it allows for better investigation of ageing processes and
      many degenerative diseases in which functional tissue is replaced by connective tissue (collagen).  
        
      Comments on revisions:  
        
      All points of criticism in the reviews were answered very well and led to further improvement of the article.
