    content: >-
      Compact identifiers are a longstanding informal convention in bioinformatics. To be used as globally unique,
      persistent, web-resolvable identifiers, they require a commonly agreed namespace registry with maintenance rules
      and clear governance; a set of redirection rules for converting namespace prefixes, provider codes and local
      identifiers to resolution URLs; and deployed production-quality resolvers with long-term sustainability.
