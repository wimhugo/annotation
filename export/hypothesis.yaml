    id: PPZ__KGfEe-t9W_MUzmz-A
    content: >-
      A TRUSTworthy repository needs to focus on serving its target user community. Each user community likely has
      differing expectations from their community repositories, depending in part on the community’s maturity regarding
      data management and sharing. A TRUSTworthy repository is embedded in its target user community’s data practices,
      and so can respond to evolving community requirements
