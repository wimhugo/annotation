    content: >-
      **Note:** This response was posted by the corresponding author to *Review Commons*. The content has not been
      altered except for formatting.


      Learn more at [Review Commons](https://reviewcommons.org)



      -----



      ### Reply to the reviewers


      We thank the Referees for their valuable input and critical review of our manuscript. Please find below our
      responses to the provided feedback.


      > 

      > __Referee # 1__

      > 

      > *1.This is a well-done study. However, I ask to the Authors to include also figures showing the macroscopic in
      ovo evidence*




      __Response__: Two photographs, each depicting an *in situ* xenograft tumour of the BxPC-3 and PANC-1 cell line
      have been added as a new figure (new Figure 1).


      > 

      > *and to discuss the role of the CAM assay in the study of xenografts.*




      __Response__: In the introduction, we briefly explained in more detail the rationale behind the use of the CAM
      model for xenografting and pointed out an important limitation of the use of nucleoside labeling within this
      model.


      > 

      > __Referee # 2__




      > 

      > __Major comments__




      > 

      > *1.**The manuscript's clinical relevance is limited, and methodological flaws prevent proper statistical
      validation of the in vitro findings.*




      __Response__: We would like to clarify that the aim of this paper is to share some important preclinical
      scientific findings highly relevant for future translational studies. First, we demonstrate that cell cycle
      labelling can be performed in CAM model xenografts via the application of nucleoside analogues. Additionally, we
      provide evidence of a novel biological phenomenon that on itself could entail an additional important limitation
      to the use of nucleoside labelling in the CAM model. Additionally, we have only provided two images concerning *in
      vitro* culture of cell lines which serve as an illustration for the similarity to the *in ovo *growth pattern and
      thus are unsure what statistical validation is required for this aspect of the manuscript.


      > 

      > *2.The entire article is based on the assertion that "... " However, even here, the authors do not provide any
      evidence that these are erythrocytes

      > and not some other cells.*




      __Response__: 


      We completely agree with the reviewer that not all chicken (embryonic) cells produce IgY. However, we would like
      to point out that the majority (if not all) IgY that is present within the developing embryo at the time of the
      CAM assay is derived originally from the hen and passed through to the embryo via the egg yolk in order to provide
      passive immunity. In fact, IgY production by embryo/chick cells is commonly observed only several days post
      hatching.1-3 Thus, IgY detection in chicken embryonic tissues remains species-specific. Though, it appears that
      large quantities of IgY are sequestered in the embryonic connective tissues. As such, this helps in segregation of
      'chicken/stromal' pixels versus 'human/xenograft' pixels. In the revised manuscript, Figure 6 now includes
      quantitative data regarding the cellular origins with the different strategies described to substantiate our 
      claims.


      Since application of this principle is of course not exclusively linked to FITC as a fluorophore, we performed
      additional immunofluorescent labelling on xenograft sections using Cy3-labelled Donkey anti-chicken IgY-antibodies
      as antibody staining to demonstrate the principle and reproducibility of using anti-IgY immunofluorescence.
      Additionally, using an anti-goat IgG-directed secondary antibody we demonstrate that, in the latter case, a
      completely different and non-specific staining pattern is obtained compared to that which is observed following
      anti chicken IgY labelling. Lastly, we added an extra image demonstrating the differences in staining pattern and
      intensity between xenograft cells and embryonic tissues and embryonic CAM epithelial cells. These images are
      provided as supplementary Figure S1.


      We have further nuanced the use of the secondary anti-chicken IgY labelling to the identification of chicken
      stroma rather than generalising the detection method to include specific labelling of __all__ chicken cells.
      Though, in our experience, human cancer cells do not exhibit substantial levels of autofluorescence in the orange
      to far red spectrum within the xenografts. In contrast, some autofluorescence in the blue-green spectrum is
      observed for chicken tissues and some cells in non-immunolabelled sections of non-grafted embryos). Therefore, we
      reserve the spectral regions with the least amount of autofluorescence (i.e., orange-far red) for subsequent
      (IF)-labelling for xenograft cells in order to maintain sufficient specificity. In other words, the FITC-staining
      aids in determining whether a pixel is chicken in identity rather than human, in our tissue preparations.


      1. Dias da Silva, W. & Tambourgi, D. V. IgY: A promising antibody for use in immunodiagnostic and in
      immunotherapy. *Vet. Immunol. Immunopathol.* __135__, 173-180 (2010).

      2. Ulmer-Franco, A. M. Transfer of Chicken Immunoglobulin Y (IgY) from the Hen to the Chick. *Avian Biol. Res.*
      __5__, 81-87 (2012).

      3. Carlander, D., Wilhelmson, M. & Larsson, A. Immunoglobulin Y Levels in Egg Yolk From Three Chicken Genotypes.
      *Food Agric. Immunol.* __15__, 35-40 (2003).

      Since application of this principle is of course not exclusively linked to FITC as a fluorophore, we performed
      additional immunofluorescent labelling on xenograft sections using Cy3-labelled Donkey anti-chicken IgY-antibodies
      as antibody staining to demonstrate the principle and reproducibility of using anti-IgY immunofluorescence.
      Additionally, using an anti-goat IgG-directed secondary antibody we demonstrate that, in the latter case, a
      completely different and non-specific staining pattern is obtained compared to that which is observed following
      anti chicken IgY labelling. Lastly, we added an extra image demonstrating the differences in staining pattern and
      intensity between xenograft cells and embryonic tissues and embryonic CAM epithelial cells. These images are
      provided as supplementary figure S1.


      We have further nuanced the use of the secondary anti-chicken IgY labelling to the identification of chicken
      stroma rather than generalising the detection method to include specific labelling of __all__ chicken cells.
      Though, in our experience, human cancer cells do not exhibit substantial levels of autofluorescence in the orange
      to far red spectrum within the xenografts. In contrast, some autofluorescence in the blue-green spectrum is
      observed for chicken tissues and some cells in non-immunolabelled sections of non-grafted embryos). Therefore, we
      reserve the spectral regions with the least amount of autofluorescence (i.e., orange-far red) for subsequent
      (IF)-labelling for xenograft cells in order to maintain sufficient specificity. In other words, the FITC-staining
      aids in determining whether a pixel is chicken in identity rather than human, in our tissue preparations.


      > 

      > 3.*The latter is actually confirmed by the authors in Fig. 7 in the form of the following sentence: "Highly
      autofluorescent (nucleated) embryonic erythrocytes can be observed throughout the tissue (arrowheads)." However,
      even here, the authors do not provide any evidence that these are erythrocytes and not some other cells.*




      __Response__: We agree with the reviewer that the use of the green emission spectra in fluorescence should be used
      with caution, especially when evaluating tissue samples. In fact, this is the reason why we reserved the higher
      wavelength channels for anti-human fluorescent detection or the (click-based) detection of nucleosides.


      Indeed, we did not present full identification of these cells, but their avian origin is undisputed as these cells
      are also observed in the same quantity in tissues on non-grafted embryos. However, we now adapted the wording in
      the manuscript to the more general term 'chicken blood cells'. Throughout the manuscript and discussion section,
      we now elaborate on the possibility that nucleated cells, observed within blood vessels of the CAM can be
      erythrocytes, leukocytes or thrombocytes (which also are nucleated in avians).


      > 

      > *4. **Tissue-specific and species-specific monoclonal antibodies to avian red cell nuclear proteins. Proceedings
      of the National Academy of Sciences of the United States of America, 79(20), 6265-6269.
      https://doi.org/10.1073/pnas.79.20.6265], and I recommend the authors use these instead of the fluorescein-labeled
      donkey anti-chicken IgY antibodies, which were misused. On the same matter, the article doesn't clarify if the
      antibodies for Ki67 and cyclin B1 can differentiate between human and chicken antigens.*




      __Response__: Other groups have also applied this anti Ki-67 primary antibody in CAM-model studies without clear
      evidence of cross-reactivity to chicken embryonic nuclei.4,5 We have not observed ourselves any substantial
      species cross-reactivity for both the applied primary anti-Ki-67 antibody nor the primary anti-cyclin B1 which is
      also illustrated by the images provided within the manuscript.



      Jarrosson, L. *et al.* An avian embryo patient-derived xenograft model for preclinical studies of human breast
      cancers. *iScience* __24__, 103423 (2021).

      Javed, S., Soukhtehzari, S., Fernandes, N. & Williams, K. C. Longitudinal bioluminescence imaging to monitor
      breast tumor growth and treatment response using the chick chorioallantoic membrane model. *Sci. Rep.* __12__,
      17192 (2022).


      > 

      > *5. Why is there no staining with antibodies to human antigens for tumor cell identification in Figures 1-2?*




      __Response__: The aim of this figure was to demonstrate the highly pleiotropic nuclear morphology of the PANC-1
      cell line compared to BxPC-3 cells while growing *in vitro *monocultures in turn comparing the growth pattern to
      that observed *in.*


      > 

      > *6. **What specific markers in Fig. 4 should lead the reader to conclude that the nuclei pointed out by the
      arrows represent embryonic epithelial nuclei (EE), nuclei of chicken embryonic blood cells (EB), and human AsPC-1
      tumor xenograft nuclei (T)?*




      __Response__: The identification of different nuclei within these images was performed on the basis of their
      morphological aspects (i.e. irregular shape, larger size...) in combination with the relative localisation of
      these nuclei within the tissue section and the typical nucleolar staining pattern. The latter is not observed in
      any of the human xenografts we routinely perform. Nevertheless, we agree that accurate discrimination between
      embryonic epithelial nuclei and embryonic blood cells cannot be guaranteed with absolute certainty in the absence
      of the use of additional markers. However, the morphological aspects combined with the anti-Ki-67 staining,
      strongly suggest the human identity of the annotated nuclei. We have modified Figure 4 (now Figure 3) to include
      Anti-Ki67 staining. Additionally, an annotation that was erroneously pointing out a mitotic figure was omitted.
      For the remaining mitotic nuclei, clear perichromosomal localisation of Ki-67 is observed which supports the claim
      that these are mitotic nuclei.


      > 

      > *7. The nuclei shown in this same figure, which supposedly display mitotic figures of dividing tumor nuclei and
      can also be clearly distinguished (M), actually more closely resemble giant multinucleated cells.*




      __Response__:


      We have added the immunofluorescent staining for Ki-67 of these images (new Figure 3); these nuclei present with
      different patterns for the marker, which would be highly unlikely in a single multinucleated cell. Further, we
      have altered the description of embryonic epithelial cells to the more general term embryonic cells (E).
      Additionally, annotation of embryonic cells was omitted from the lower panels in order to draw the focus on the
      polymorphic nature of the human tumour nuclei rather than the embryonic surrounding cells.


      > 

      > *8. The statement "After immunolabeling for human Ki67, we confirmed that all EdU+ xenograft nuclei were also
      Ki67+, confirming the specificity and compatibility of both labeling strategies in CAM xenograft tumor cells
      (Figure 5)" is not supported by the image, which shows that the majority of Ki67-positive nuclei are
      EdU-negative.*




      __Response__: 


      During cell cycle progression, nuclear levels of Ki-67 gradually increase during S-phase and peak during mitosis.
      As a consequence, all S-phase cells (EdU+ nuclei) will present detectable nuclear levels of Ki-67. The reverse is
      not necessarily true: the nuclei of cells that are within G2 and mitosis during the nucleoside labelling will
      present with high levels of nuclear Ki-67 but will not show nuclear incorporation for EdU as these have already
