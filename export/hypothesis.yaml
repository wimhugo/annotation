    content: >-
      **eLife Assessment**  
        
      This valuable study addressed a key question in epilepsy research: whether the recordings of very fast
      oscillations in the brain (>250Hz, fast ripples) reflect underlying pathology or might be a property that emerges
      from a neuronal network at random. The strengths of the study are the importance of the question, the multiple
      methods, and the solid evidence. However, there are limitations to the methods that should be addressed.
