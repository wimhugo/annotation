  annotation_79:
    id: tLpqtD70EfG-8ROa85o6DQ
    content: >-
      **Reviewer #3 (Public review):**  
        
      Summary:  
        
      This study sought to explore how neural representations during encoding change with expertise or proficiency in
      the method of loci (MoL). To do this, the authors compared three groups: memory athletes (experts in MoL), naive
      controls, and naive participants before and after 6 weeks of MoL training and analyzed how similar their
      encoding-related activity patterns were across groups and training. They found that in lateral prefrontal,
      inferior temporal, and posterior parietal regions, pattern similarity decreased with expertise and training. They
      also found that changes in similarity between pre- and post-training were associated with improvements in memory
      performance measured 4 months later. Additionally, in a follow-up exploratory analysis on the temporal order
      recognition task, neural patterns were more similar for those proficient in MoL - a contrast to the decrease seen
      at encoding. Taken together, the authors interpret these findings as evidence that proficiency with the method of
      loci is associated with distinct encoding representations: Broadly, the findings suggest that greater
      representational differentiation at encoding may be associated with better memory.  
        
      Strengths:  
        
      (1) The manuscript is impressively rich with analyses. Their general claim that neural differentiation increases
      between individuals with MoL experience is thus addressed in this work. Specifically, the authors effectively
      explore different levels of granularity to tackle the question of whether a participant's neural representation
      (with MoL experience) looks more similar to that of another (with less experience) during encoding.  
        
      (2) The authors connect their hypotheses about neural representational differences caused by training to
      behavioral data (and 4 months later at that).  
        
      (3) Although exploratory, they not only look at encoding-related differences, but also retrieval-related
      differences.  
        
      (4) The authors provide many supplementary figures with complementary and interesting findings. As I read, I found
      myself curious about exploratory analyses, which were then addressed in supplementary figures.  
        
      Weaknesses:  
        
      (1) The manuscript is impressively rich, but the number of analyses and levels of comparison (and how they are
      presented) made it difficult to follow. The paper would benefit from an anticipatory introductory paragraph (or an
      introductory Results paragraph) that explicitly states the hypotheses and which sections of the results addressed
      them. Additionally, given how this is a Methods-last formatted paper, the manuscript would benefit from a few
      introductory sentences at each Results section describing the methodology.  
        
      (2) One of the motivations needs strengthening. Given the introduction, the manuscript seems to be motivated by
      two complementary questions: (i) whether neural differentiation effects reported with short-term MoL training (as
      done in Liu et al., 2022) extend with longer-term training and expertise and (ii) whether training might lead
      individuals towards a canonical "expert" representation that can only be acquired through training as has been
      previously shown in other work (e.g., Meshulam et al., 2021).  
        
      The first motivation is clear and compelling. The second one, however, does not feel as well grounded. In studies
      like Meshulam et al., alignment is expected because participants are exposed to the same stimulus or concept. In
      contrast, as the authors note, a user of the method of loci is encouraged to create unique, vivid representations
      of their loci and to-be-remembered items - here, neural alignment is at odds with the premise of the technique. As
      such, the described tension between increased pattern similarity across the studies cited in the second paragraph
      of the introduction and individuals proficient with MoL feels underdeveloped (despite the reference-rich second
      paragraph).  
        
      The authors would benefit from articulating why the counterfactual of "increased neural alignment" might be
      expected, specifically, in the method of loci. In other words, why should we expect trainees to become more
      similar to experts when the strategy itself promotes idiosyncratic representations? Perhaps, the authors could
      distinguish between alignment at the level of knowledge representations vs the process of encoding (e.g., the act
      of placing items into loci).  
        
      (3) Relatedly, terminology referencing the employed methodology is a bit unclear. In some of the papers cited that
      look at pattern similarity across people (like Meshulam et al., or Koch et al.), the spatial patterns of
      individuals are compared with 'template' patterns that reflect the canonical representation of a concept or
      episode. However, the manuscript does not include this type of template-based comparison. This is understandable
      because there may not be a representative canonical pattern when each participant has their own idiosyncratic
      palace. In this case, a pairwise comparison may be more fitting as it focuses on the distances between people's
      representations instead of the distances between them and a group template. Although both comparisons (pairwise
      and template-based similarities) are related, they have different interpretations. A clearer justification for why
      pairwise similarity, instead of template-based similarity (as in many of the cited papers), is the more
      appropriate metric in this paradigm early on would add to the clarity of the work. Additionally, this slight
      difference in methodology was confusing because some portions of the text (including the figures) say "group
      average", but in others, we see "pairwise".  
        
      Minor Comments:  
        
      A recent paper (Masis-Obando et al., 2026, Nat Hum Behav) shows that stable and distinctive spatial
      representations can support later reinstatement of items placed within those contexts. Their conclusions seem to
      support your hypotheses and results here. In parallel, prior work (like Robin et al., 2018, J Neurosci) emphasizes
      the importance of spatial contexts for the representation of events. Given how MoL encoding relies on vivid
      context-item binding, including these perspectives in the Introduction (and/or discussion) may help frame the
      current findings within the broader memory literature.  
        
      Overall, this work provides rich and valuable contributions to the field.
