  annotation_88:
    id: SZAZJD7zEfGrU7PAMECJWw
    content: >-
      **Reviewer #2 (Public review):**  
        
      Summary:  
        
      There are astonishingly few papers trying to reproduce the process of initiation and spreading that Braaks studies
      have suggested and postulated. The authors should be applauded for pioneering such a difficult experiment. They
      overexpressed the TDP-43 protein in the motor neuron pool of the brachioradialis muscle and showed that by this
      technique, motor neurons in this pool died, and the muscle got denervated. They had evidence of a spreading
      process from the spinal cord to the cortex, demonstrated by showing widespread deposits of phosphorylated TDP-43
      bilaterally in the cervical cord and the motor cortex. By their experiment, they created a dying-backwards model,
      not a model of corticofugal spread, like that shown by Braak. No muscle weakness was observed, not even in the
      brachioradialis.  
        
      Strengths:  
        
      The strength of this innovative study is the fact that this spreading experiment uses the phylogenetically young
      connectome of primates (macaques). They also made the thought-provoking observation of spreading from the cord to
      the motor cortex, not the corticofugal spread model observed by Heiko Braak. This is thought-provoking because
      this enables the observer to compare their model with the findings in humans.  
        
      Weaknesses:  
        
      The following aspects are not a weakness but need to be better explained for the interested reader - and
      potentially improved in future studies for which the authors laid the foundation:  
        
      (1) Why do the authors use the brachioradialis motor neuron pool to overexpress TDP-43? More is known about other
      muscles and how they are embedded in the motor connectome of primates. Why not the biceps brachii or the hand
      extensors or - even better - the small muscles of the hand? These are known to be strongly monosynaptically
      connected with the motor cortex. The authors should explain this. I am unclear if there was a specific reason
      which I did not see or understand. In my view, the brachioradialis is not the best representative of the primate
      connectome, for example, to examine this model and compare it with the corticofugal spread.  
        
      (2) In the Braaks experiment, only (seemingly soluble) non-phoshorylated TDP-43 "crossed" synapses. Phosphorylated
      TDP-43 did not do this. The authors of this study saw phosphorylated TDP43 in motor neurons and the cortex. Is
      there any potential explanation for how it crosses synapses? If it really does, there is an obvious difference to
      the human situation which needs to be emphasized and explained (in the future).  
        
      (3) There were significant deposits of phosphorylated TDP-43 in oligodendrocytes in humans. Whilst I understand
      that one experiment cannot solve every question - I am curious about whether the authors saw anything in
      oligodendrocytes?  
        
      (4) Which was the pattern of damage? Of course, this pattern is not likely to have a monosynaptic pattern - like
      in humans........but was there a pattern? Did it have a physiologically meaningful basis? Was there any relation
      to the corticofugal monosynaptic pattern? What are the differences? The authors speak of "multiple waves". Does
      this mean that if this were a corticofugal model, for example, oculomotor neurons would also degenerate?
