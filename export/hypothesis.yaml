      for several reasons. For instance, when performing EdU labelling *in vitro*, initial dose-and duration titration
      are recommended to establish satisfactory labelling efficiency for the research hypothesis in question. In our
      research, we are predominantly focusing on relatively short-lived effects of treatments on S-phase progression and
      therefore prefer to apply labelling (*in vitro* and *in ovo*) for durations of less than 60 minutes. In contrast,
      extended labelling durations of several hours will allow one to capture replication even in very slowly
      proliferating (cancer) cells at the cost of temporal resolution. Importantly, the growth rates of individual cell
      lines within the CAM model may differ from their behaviour *in vitro*. Additionally, long duration nucleoside
      (EdU) labelling may induce additional toxicity. Alternative analogues such as F-ara-EdU with improved safety
      profiles for long labelling durations should then be considered. In the revised manuscript, labelling with
