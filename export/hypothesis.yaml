    id: Mjj9SGgBEe6-WctSuW0Spw
    content: >-
      When content underlying a DOI is updated, we recommend updating the DOI metadata and, for major changes, assigning
      a new DOI.


      For minor content changes, the same DOI may be used with updated metadata. A new DOI is not required.

      For major content changes, we recommend assigning a new DOI and linking the new DOI to the previous DOI with
      related identifiers.
    description: Characteristics
    tags:
      - _FI_
      - PID Features
      - PID Best Practices
      - Versioning
    source_url: https://support.datacite.org/docs/tombstone-pages
