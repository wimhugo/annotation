  annotation_29:
    id: pMXJMj8DEfGMKTux4dWHaw
    content: >-
      **Reviewer #2 (Public review):**


      Summary:


      Despite their common co-occurrence, depression and anxiety are known to alter mood fluctuations in opposite ways.
      Here, the authors aimed at distinguishing depression-specific from anxiety-specific from psychopathology-general
      effects of reward processing on mood fluctuations, focusing on reward prediction errors (RPEs), which are known to
      be linked to mood fluctuations. This mechanistic study aims at uncovering the process through which these
      psychopathologies are associated with mood modulations. The authors were able to appropriately test their
      hypothesis and obtained results corroborating their conclusions.


      This work provides a convincing demonstration of the relevance of computational psychiatry (Huys et al, 2016) and
      the use of decision neuroscience to shed light on the interplay of anxiety, depression, and mood.


      Strengths:


      The authors used a tripartite model to distinguish depression vs anxiety, as well as a computational model
      distinguishing reward expectation (EV in the model) from outcome processing through RPE, which are two sequential
      cognitive processes.


      The manuscript adequately addresses the concerns one would have regarding risk-attitudes and regarding referring
      to trending statistical results.


      Weaknesses:


      The sample size of the clinical sample (N=116) may not be sufficient to detect anxiety-specific effects due to the
      high rate of comorbid anxious depression. It would be beneficial to include the number of MDD vs GAD vs anxious
      depression diagnoses in the clinical population, as this would likely shine light on the power limitations. 
