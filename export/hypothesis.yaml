  annotation_12:
    id: _7_QDPQ2EfCHfm85XXLzzQ
    content: >-
      Repository users should have confidence that data depositors are prompted to provide all metadata compliant with
      the community norms, as this greatly enhances the discoverability and usefulness of the data. Knowing that a
      repository verifies the integrity of available data and metadata assures potential users that the data holdings
      are more likely to be interoperable with other relevant datasets. Both depositors and users must have confidence
      that the data will remain accessible over time, and thus can be cited and referenced in scholarly publications.
    description: Metadata aligned with community norms
    tags:
      - TRSP
      - TRUST
      - Meatadata
      - Community Norms
    source_url: https://www.nature.com/articles/s41597-020-0486-7
    created: '2026-01-18T06:29:10.277518+00:00'
  annotation_13:
    id: wimeMHD7EfCOUitU7dl9Cw
    content: |-
      A persistent identifier is a long-lasting reference to a resource.
                  The data(set) you deposit in a
                  data repository should be assigned a globally unique, persistent and resolvable identifier (PID) so that
                  both humans and machines can find it. Persistent identifiers are maintained and governed so that they remain
                  stable and direct the users to the same relevant object consistently over time. Examples of PIDs include
                  Digital Object Identifier (DOI),
                  Handle, and
                  Archival Resource Key (ARK).
    description: Persistent identifier
    tags:
      - cat_FAIR
      - cat_F1
      - cat_WHAT
    source_url: https://fairaware.dans.knaw.nl/
    created: '2025-08-04T06:25:04.455307+00:00'
  annotation_14:
    id: K2TDzuUbEe-jDjNz09kbhg
    content: "The PID Meta Resolver\_is a generalized resolver for mapping items into records. The \_PID Meta Resolver\_will know where to route different types of identifiers – e.g. DOI or URN:NBN.\_The PID Meta Resolver will improve machine based data processing and will allow getting digital object information without in-depth knowledge of the resolution mechanism of different PID systems. That enhances the compilation and analysis of data collections originating not only from different sources but also referenced by different PID systems."
    description: Example metaresolver
    tags:
      - PID Resolution
      - PID_Metaresolver
    source_url: https://faircore4eosc.eu/eosc-core-components/eosc-pid-meta-resolver-pidmr
    created: '2025-02-07T06:17:12.625986+00:00'
  annotation_15:
