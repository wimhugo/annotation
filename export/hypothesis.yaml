      (1) Some of the simulated FRs appear short in duration and may not meet standard detection and definition
      criteria, potentially influencing validity.  
        
      (2) The neuronal culture approach does not directly test random insertion of action potentials, limiting
      interpretation.  
        
      (3) Sleep is treated as a homogeneous state in the rat dataset, without accounting for stage-specific differences
      in synchronization, which may affect the results and interpretation.  
        
      (4) The analyses conducted in human data lack direct comparison with sleep data.
